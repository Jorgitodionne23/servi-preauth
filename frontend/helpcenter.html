<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SERVI — Help Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=Syne:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/shared-styles.css">
  <link rel="stylesheet" href="/shared/landing-theme.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    .hc-hero {
      background: var(--color-bg-dark);
      color: #fff;
      padding: 180px 0 120px;
      position: relative;
      overflow: hidden;
    }
    .hc-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 80% 20%, rgba(149,204,213,0.18), transparent 60%);
      pointer-events: none;
    }
    .hc-hero > .container { position: relative; z-index: 1; }
    .hc-hero h1 {
      font-family: var(--font-heading);
      font-size: clamp(44px, 6vw, 72px);
      font-weight: 800;
      line-height: 1.02;
      letter-spacing: -0.02em;
      color: #fff;
    }
    .hc-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 22px 36px;
      border-radius: var(--radius-md);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      font-family: var(--font-body);
      border: 1px solid rgba(255,255,255,0.18);
      transition: all 0.25s var(--morph-ease);
      text-decoration: none;
      text-align: center;
      min-width: 240px;
      backdrop-filter: blur(12px);
    }
    .hc-btn:hover {
      background: var(--color-accent);
      border-color: var(--color-accent);
      transform: translateY(-2px);
      box-shadow: 0 14px 28px -12px rgba(149,204,213,0.6);
    }
    @media (max-width: 768px) {
      .hc-hero { padding: 120px 0 64px; }
      .hc-btn { min-width: 0; padding: 16px 24px; width: 100%; }
    }
  </style>
</head>
<body class="landing-page">
<script src="/config.js"></script>
<script src="/shared/i18n.js"></script>
<script src="/shared/shared-auth.js"></script>
<div id="navbar"></div>
<script src="/shared/morphing-nav.js"></script>

<section class="hc-hero">
  <div class="container">
    <h1 class="heading-lg" style="margin-bottom:24px" data-i18n="helpcenter.title">Reporta Problemas o Comparte Ideas</h1>
    <p style="font-size:17px;color:rgba(255,255,255,0.7);max-width:600px;line-height:1.7;margin-bottom:48px" data-i18n="helpcenter.intro">
      Bienvenido al Centro de Ayuda y Feedback de SERVI. Reporta cualquier incidente que hayas experimentado o comparte tus valiosas sugerencias e ideas sobre cómo podemos mejorar SERVI para ti y para todos.
    </p>
    <div style="display:flex;gap:20px;flex-wrap:wrap">
      <a href="/helpcenter/report.html" class="hc-btn" data-i18n-html="helpcenter.ctaReport">Reportar Incidente<br>o Problema</a>
      <a href="/helpcenter/suggestion.html" class="hc-btn" data-i18n-html="helpcenter.ctaSuggestion">Compartir<br>Sugerencia o Idea</a>
    </div>
  </div>
</section>

<div id="footer"></div>
<script src="/shared/shared-footer.js"></script>
</body>
</html>
