<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Correo verificado — SERVI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=Syne:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/shared-styles.css">
  <link rel="stylesheet" href="/shared/landing-theme.css">
  <style>
    html {
      min-height: 100%;
    }
    body {
      min-height: 100dvh;
      padding: 32px 20px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 18% 14%, rgba(149, 204, 213, 0.28), transparent 28%),
        radial-gradient(circle at 82% 6%, rgba(255, 255, 255, 0.95), transparent 24%),
        linear-gradient(180deg, #ffffff 0%, var(--color-bg, #f7f7f7) 44%, #eeeeee 100%);
      color: var(--color-text, #111111);
      font-family: var(--font-body, 'DM Sans', sans-serif);
      position: relative;
      overflow-x: hidden;
    }
    .verification-shell {
      width: min(100%, 500px);
      position: relative;
      z-index: 1;
    }
    .email-verified-page .verification-logo {
      display: block;
      width: fit-content;
      margin: 0 0 18px 4px;
      color: #000000;
      font-size: 38px;
      text-decoration: none;
    }
    .close-btn:focus-visible {
      outline: 3px solid rgba(149, 204, 213, 0.45);
      outline-offset: 4px;
    }
    .verification-card {
      width: 100%;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: var(--radius-xl, 24px);
      padding: 40px;
      text-align: left;
      box-shadow: 0 28px 64px -36px rgba(17, 17, 17, 0.32);
      backdrop-filter: saturate(145%) blur(22px);
    }
    .success-icon {
      width: 64px;
      height: 64px;
      margin: 0 0 28px;
      background: rgba(149, 204, 213, 0.16);
      border: 1px solid rgba(149, 204, 213, 0.36);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #4f9fab;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
      transition: background var(--duration-normal, 0.3s), color var(--duration-normal, 0.3s), border-color var(--duration-normal, 0.3s);
    }
    .success-icon svg {
      width: 34px;
      height: 34px;
      display: block;
      stroke: currentColor;
    }
    .verification-card.is-loading .success-icon {
      color: var(--color-text-muted, #888888);
      background: rgba(255, 255, 255, 0.72);
      border-color: var(--color-border, #e8e8e8);
    }
    .verification-card.is-loading .success-icon::before {
      content: "";
      width: 22px;
      height: 22px;
      border: 2px solid rgba(10, 10, 10, 0.12);
      border-top-color: var(--color-text, #0a0a0a);
      border-radius: 50%;
      animation: spin 0.82s linear infinite;
    }
    .verification-card h1 {
      font-family: var(--font-heading, 'Syne', sans-serif);
      font-size: clamp(30px, 8vw, 42px);
      font-weight: 800;
      color: var(--color-text, #111111);
      margin: 0 0 14px;
      letter-spacing: -0.02em;
      line-height: 1.04;
      text-wrap: balance;
    }
    .verification-card p {
      max-width: 34rem;
      font-size: 16px;
      color: var(--color-text-secondary, #555555);
      margin: 0;
      line-height: 1.7;
      text-wrap: pretty;
    }
    .countdown {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 28px 0 0;
      padding: 9px 12px;
      border: 1px solid rgba(149, 204, 213, 0.34);
      border-radius: var(--radius-md, 12px);
      background: rgba(149, 204, 213, 0.12);
      color: var(--color-text-secondary, #555555);
      font-size: 13px;
      font-weight: 600;
    }
    .countdown::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--color-accent, #95ccd5);
      box-shadow: 0 0 0 4px rgba(149, 204, 213, 0.18);
    }
    .close-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      margin-top: 28px;
      padding: 13px 24px;
      background: var(--color-text, #111111);
      color: #ffffff;
      border: none;
      border-radius: var(--radius-md, 12px);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform var(--duration-fast, 0.2s), box-shadow var(--duration-fast, 0.2s), background var(--duration-fast, 0.2s);
      box-shadow: 0 18px 30px -22px rgba(17, 17, 17, 0.7);
    }
    .close-btn:hover {
      background: #222222;
      transform: translateY(-1px);
      box-shadow: 0 22px 36px -22px rgba(17, 17, 17, 0.72);
    }
    .close-btn:active {
      transform: translateY(0) scale(0.98);
    }
    .close-btn:disabled {
      cursor: wait;
      opacity: 0.62;
      transform: none;
      box-shadow: none;
    }
    .verification-note {
      margin-top: 18px;
      color: var(--color-text-muted, #888888);
      font-size: 13px;
      line-height: 1.6;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @media (max-width: 480px) {
      body {
        align-items: start;
        padding: 26px 16px;
      }
      .verification-card {
        padding: 30px 24px;
        border-radius: 20px;
      }
      .email-verified-page .verification-logo {
        margin-bottom: 14px;
        font-size: 32px;
      }
      .success-icon {
        width: 58px;
        height: 58px;
        margin-bottom: 24px;
      }
      .close-btn {
        width: 100%;
      }
    }
    .hidden {
      display: none;
    }
  </style>
  <script src="/config.js"></script>
  <script src="/shared/i18n.js"></script>
  <script>
    window.__renderEmailVerifiedScreen = function(options) {
      var opts = options || {};
      var es = opts.es !== undefined
        ? opts.es
        : (localStorage.getItem('servi_lang') === 'es' || !localStorage.getItem('servi_lang'));
      var canClose = opts.canClose !== undefined ? opts.canClose : !!window.opener;
      var title = opts.loading
        ? (es ? 'Verificando correo' : 'Verifying email')
        : (es ? 'Correo verificado' : 'Email verified');
      var message = opts.loading
        ? (es ? 'Estamos confirmando el enlace. Mantén esta ventana abierta un momento.' : 'We are confirming the link. Keep this window open for a moment.')
        : (es ? 'Tu correo ha sido verificado. Puedes volver a la ventana donde empezaste el registro.' : 'Your email has been verified. You can return to the window where you started signing up.');
      var buttonText = opts.loading
        ? (es ? 'Verificando...' : 'Verifying...')
        : (canClose ? (es ? 'Cerrar ventana' : 'Close window') : (es ? 'Cerrar pestaña' : 'Close tab'));
      var verifiedIcon = '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false"><path d="M5 12.5l4.2 4.2L19 7" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';

      if (!document.body) {
        document.addEventListener('DOMContentLoaded', function() {
          window.__renderEmailVerifiedScreen(opts);
        }, { once: true });
        return;
      }

      document.body.className = 'email-verified-page landing-page';
      document.body.innerHTML =
        '<main class="verification-shell" aria-live="polite">' +
          '<a href="/index.html" class="site-header__logo logo verification-logo">SERVI<span class="logo-dot">.</span></a>' +
          '<section class="verification-card' + (opts.loading ? ' is-loading' : '') + '" id="verification-card" aria-labelledby="verification-title">' +
            '<div class="success-icon" role="img" aria-label="' + (opts.loading ? (es ? 'Verificando' : 'Verifying') : (es ? 'Verificación exitosa' : 'Verified')) + '">' + (opts.loading ? '' : verifiedIcon) + '</div>' +
            '<h1 id="verification-title">' + title + '</h1>' +
            '<p id="verification-message">' + message + '</p>' +
            '<div class="countdown hidden" id="countdown"></div>' +
            '<button class="close-btn" id="close-btn" type="button"' + (opts.loading ? ' disabled' : '') + '>' + buttonText + '</button>' +
            '<div class="verification-note" id="verification-note">' + (canClose ? (es ? 'Si la ventana no se cierra sola, puedes cerrarla manualmente.' : 'If the window does not close automatically, you can close it manually.') : (es ? 'Para terminar tu registro, vuelve a la pestaña donde lo iniciaste. Tu correo ya está verificado allí.' : 'To finish signing up, return to the tab where you started. Your email is already verified there.')) + '</div>' +
          '</section>' +
        '</main>' +
        '<div id="auth-modal-global"></div>';

      var closeBtn = document.getElementById('close-btn');
      if (closeBtn && !opts.loading) {
        closeBtn.addEventListener('click', function() {
          window.close();
        });
      }
    };

  </script>
</head>
<body class="email-verified-page landing-page">

<main class="verification-shell" aria-live="polite">
  <a href="/index.html" class="site-header__logo logo verification-logo">SERVI<span class="logo-dot">.</span></a>
  <section class="verification-card is-loading" id="verification-card" aria-labelledby="verification-title">
    <div class="success-icon" role="img" aria-label="Verificando"></div>
    <h1 id="verification-title">Verificando correo</h1>
    <p id="verification-message">Estamos confirmando el enlace. Mantén esta ventana abierta un momento.</p>
    <div class="countdown hidden" id="countdown"></div>
    <button class="close-btn" id="close-btn" type="button" disabled>Verificando...</button>
    <div class="verification-note" id="verification-note">Esto solo tarda unos segundos.</div>
  </section>
</main>

<script src="/shared/shared-auth.js"></script>
<script>
  window.__handleEmailLinkAsScreen = function() {
    window.__renderEmailVerifiedScreen({ loading: false, canClose: !!window.opener });
    if (window.__broadcastEmailVerified) {
      window.__broadcastEmailVerified();
    }
  };
</script>

<script>
  (async function() {
    // Determine language
    var es = localStorage.getItem('servi_lang') === 'es' || !localStorage.getItem('servi_lang');
    if (window.__renderEmailVerifiedScreen) {
      window.__renderEmailVerifiedScreen({ loading: true, es: es });
    }

    // Check for token-based email verification (Nodemailer path)
    var urlParams = new URLSearchParams(window.location.search);
    var verifyToken = urlParams.get('token');
    var firebaseMode = urlParams.get('mode');
    var isAccountEmailAction = firebaseMode === 'verifyAndChange' || firebaseMode === 'verifyAndChangeEmail' || firebaseMode === 'verifyEmail';
    if (verifyToken) {
      try {
        var apiBase = (window.CONFIG && window.CONFIG.API_BASE) || '';
        var res = await fetch(apiBase + '/api/auth/verify-email?token=' + encodeURIComponent(verifyToken));
        var data = await res.json();
        if (res.ok && data.verified) {
          if (window.__broadcastEmailVerified) {
            window.__broadcastEmailVerified();
          }
          window.__renderEmailVerifiedScreen({ loading: false, es: es, canClose: !!window.opener });
          // No auto-close: the tab stays on the success screen until the user clicks
          // the close button, so they can return to the tab they started from.
          return;
        } else {
          throw new Error('Verification failed: ' + (data.error || 'unknown'));
        }
      } catch (err) {
        console.error('[email-verified] Token verification error:', err);
        // Show error UI: render success card but with error message
        window.__renderEmailVerifiedScreen({ loading: false, es: es, canClose: !!window.opener });
        var msgEl = document.getElementById('verification-message');
        if (msgEl) {
          msgEl.textContent = es ? 'Este enlace es inválido o ya expiró.' : 'This link is invalid or has expired.';
          msgEl.style.color = '#c55d49';
        }
        var titleEl = document.getElementById('verification-title');
        if (titleEl) {
          titleEl.textContent = es ? 'Enlace inválido' : 'Invalid link';
        }
        return;
      }
    }

    // Wait for handleEmailLinkSignIn to complete — this ensures:
    // 1. Firebase sign-in is done before we show success UI (so user can't close early)
    // 2. __broadcastEmailVerified has already been called for email-first signups
    if (window.__emailLinkProcessingPromise) {
      try { await window.__emailLinkProcessingPromise; } catch (_) {}
    } else if (window.__syncPromise) {
      try { await window.__syncPromise; } catch (_) {}
    }

    if (window.__emailLinkProcessingStatus === 'missing-email' || window.__emailLinkProcessingStatus === 'error') {
      window.__renderEmailVerifiedScreen({ loading: false, es: es, canClose: !!window.opener });
      var errorMsgEl = document.getElementById('verification-message');
      if (errorMsgEl) {
        errorMsgEl.textContent = es ? 'No pudimos confirmar este enlace. Solicita un nuevo enlace e intenta de nuevo.' : 'We could not confirm this link. Request a new link and try again.';
        errorMsgEl.style.color = '#c55d49';
      }
      var errorTitleEl = document.getElementById('verification-title');
      if (errorTitleEl) {
        errorTitleEl.textContent = es ? 'Verificación pendiente' : 'Verification pending';
      }
      return;
    }

    var pendingAccountEmailAction = localStorage.getItem('servi_email_verification_mode');
    if (isAccountEmailAction || pendingAccountEmailAction) {
      if (window.__emailLinkProcessingStatus === 'account-email-verified') {
        // Verified successfully. Show the success screen (don't redirect) so the user
        // can close this tab and return to the account tab, which refreshes itself.
        window.__renderEmailVerifiedScreen({ loading: false, es: es, canClose: !!window.opener });
        return;
      }
      window.__renderEmailVerifiedScreen({ loading: false, es: es, canClose: !!window.opener });
      var accountMsgEl = document.getElementById('verification-message');
      if (accountMsgEl) {
        accountMsgEl.textContent = es ? 'No pudimos confirmar este correo. Solicita un nuevo enlace desde tu cuenta.' : 'We could not confirm this email. Request a new link from your account.';
        accountMsgEl.style.color = '#c55d49';
      }
      var accountTitleEl = document.getElementById('verification-title');
      if (accountTitleEl) {
        accountTitleEl.textContent = es ? 'Verificación pendiente' : 'Verification pending';
      }
      return;
    }

    // Broadcast unconditionally — works cross-tab via localStorage storage event
    // regardless of whether window.opener exists (email clients open without opener).
    if (window.__broadcastEmailVerified) {
      window.__broadcastEmailVerified();
    }

    // If __handleEmailLinkAsScreen() already replaced the body (email-first signup path),
    // our static elements are gone — nothing more to do.
    if (!document.getElementById('close-btn')) return;

    var canClose = !!window.opener;
    window.__renderEmailVerifiedScreen({ loading: false, es: es, canClose: canClose });
    // No auto-close: the tab stays on the success screen until the user clicks the
    // close button, so they can return to the tab where they started the flow.
  })();
</script>

</body>
</html>
