<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SERVI — Legal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/shared-styles.css">
  <link rel="stylesheet" href="/shared/landing-theme.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    .legal-tabs {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 40px;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 0;
    }
    .legal-tab {
      padding: 14px 20px;
      border-radius: 0;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      border-bottom: 2px solid transparent;
      background: transparent;
      font-family: var(--font-body);
      color: var(--color-text-muted);
      transition: all 0.2s var(--morph-ease);
      margin-bottom: -1px;
    }
    .legal-tab:hover { color: var(--color-text); }
    .legal-tab--active {
      color: var(--color-text);
      border-bottom-color: var(--color-accent);
      font-weight: 600;
    }
    .legal-content { display: none; }
    .legal-content--active { display: block; }
    .legal-body {
      background: var(--color-card-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 36px;
      min-height: 400px;
    }
    @media (max-width: 768px) {
      .legal-body { padding: 20px; }
    }
    .legal-iframe { width: 100%; height: 600px; border: none; border-radius: var(--radius-md); }
  </style>
</head>
<body class="landing-page">
<script src="/config.js"></script>
<script src="/shared/i18n.js"></script>
<script src="/shared/shared-auth.js"></script>
<div id="navbar"></div>
<script src="/shared/morphing-nav.js"></script>

<section style="padding-top:120px;padding-bottom:80px">
  <div class="container" style="max-width:900px">
    <h1 class="heading-lg" style="margin-bottom:32px" data-i18n="legal.title">Legal</h1>

    <div class="legal-tabs" id="legal-tabs">
      <button class="legal-tab legal-tab--active" data-tab="terms" onclick="showTab('terms')" data-i18n="legal.tabs.terms">Términos y Condiciones</button>
      <button class="legal-tab" data-tab="privacy" onclick="showTab('privacy')" data-i18n="legal.tabs.privacy">Aviso de Privacidad</button>
      <button class="legal-tab" data-tab="cancellation" onclick="showTab('cancellation')" data-i18n="legal.tabs.cancellation">Política de Cancelación</button>
      <button class="legal-tab" data-tab="legal-notice" onclick="showTab('legal-notice')" data-i18n="legal.tabs.legalNotice">Aviso Legal</button>
      <button class="legal-tab" data-tab="stripe" onclick="showTab('stripe')" data-i18n="legal.tabs.stripe">Términos de Stripe</button>
    </div>

    <div id="tab-terms" class="legal-content legal-content--active">
      <div class="legal-body" id="terminos">
        <h2 class="heading-md" style="margin-bottom:16px" data-i18n="legal.sections.termsTitle">Términos y Condiciones de Uso</h2>
        <iframe class="legal-iframe" src="https://docs.google.com/document/d/1p-eHJYN-_YQkeqbEpfFwIPU7ftSdMHkt_3b_TPLeuSY/preview" title="Términos y Condiciones"></iframe>
      </div>
    </div>
    <div id="tab-privacy" class="legal-content">
      <div class="legal-body" id="privacidad">
        <h2 class="heading-md" style="margin-bottom:16px" data-i18n="legal.sections.privacyTitle">Aviso de Privacidad</h2>
        <iframe class="legal-iframe" src="https://docs.google.com/document/d/1shyA_pkoiNzeLi4ey4cMpLvzO27kcUuarjrYE6T6s5Q/preview" title="Aviso de Privacidad"></iframe>
      </div>
    </div>
    <div id="tab-cancellation" class="legal-content">
      <div class="legal-body" id="cancellation">
        <h2 class="heading-md" style="margin-bottom:16px" data-i18n="legal.sections.cancellationTitle">Política de Cancelación</h2>
        <iframe class="legal-iframe" src="https://docs.google.com/document/d/1LMNfDCVBrr17xlqiF8SWB02a8dh59w99krGzHGY6IJk/preview" title="Política de Cancelación"></iframe>
      </div>
    </div>
    <div id="tab-legal-notice" class="legal-content">
      <div class="legal-body" id="legal-notice">
        <h2 class="heading-md" style="margin-bottom:16px" data-i18n="legal.sections.legalTitle">Aviso Legal</h2>
        <iframe class="legal-iframe" src="https://docs.google.com/document/d/1gpZwp5htZUcSEuoed3ibfbjFM02vmDggGGYa-vao5aU/preview" title="Aviso Legal"></iframe>
      </div>
    </div>
    <div id="tab-stripe" class="legal-content">
      <div class="legal-body">
        <h2 class="heading-md" style="margin-bottom:16px" data-i18n="legal.sections.stripeTitle">Términos y Condiciones de Stripe</h2>
        <p style="color:#666;font-size:15px;line-height:1.7;margin-bottom:16px">Para información sobre los términos de Stripe, consulta:</p>
        <a href="https://stripe.com/es_mx/legal" target="_blank" class="text-accent" style="font-weight:600">Términos de Servicios de Stripe →</a>
      </div>
    </div>
  </div>
</section>

<div id="footer"></div>
<script src="/shared/shared-footer.js"></script>
<script>
function showTab(name) {
  document.querySelectorAll('.legal-content').forEach(el => el.classList.remove('legal-content--active'));
  document.querySelectorAll('.legal-tab').forEach(el => el.classList.remove('legal-tab--active'));
  const panel = document.getElementById('tab-' + name);
  const tab = document.querySelector('[data-tab="' + name + '"]');
  if (panel) panel.classList.add('legal-content--active');
  if (tab) tab.classList.add('legal-tab--active');
}
// Handle anchor links (e.g., /legal.html#privacy)
(function() {
  const hash = window.location.hash.replace('#', '');
  if (hash) showTab(hash);
})();
</script>
</body>
</html>
