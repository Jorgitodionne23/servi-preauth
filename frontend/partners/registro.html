<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SERVI — Registro de Partner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/shared-styles.css">
  <link rel="stylesheet" href="/shared/landing-theme.css">
  <script>/* Hide scroll-reveal targets before first paint to prevent flicker; failsafe reveals them if the motion layer never loads (see motion.js + shared-styles.css). */(function(){var d=document.documentElement;d.classList.add('reveal-armed');setTimeout(function(){d.classList.remove('reveal-armed');},2000);})();</script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="landing-page">
<script src="/config.js"></script>
<script src="/shared/i18n.js"></script>
<script src="/shared/shared-auth.js"></script>
<div id="navbar"></div>
<script src="/shared/morphing-nav.js"></script>

<section style="padding-top:120px;padding-bottom:80px">
  <div class="container" style="max-width:640px">
    <div id="page-header" data-reveal>
      <a href="/partners.html" class="nav-link" style="display:inline-flex;align-items:center;gap:6px;margin-bottom:24px">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        <span data-i18n="nav.partners">Partners</span>
      </a>
      <h1 class="heading-lg" style="margin-bottom:8px" data-i18n="partnerForm.title">Registro de Partner</h1>
      <p class="text-body" style="margin-bottom:32px" data-i18n="partnerForm.sub">Completa tu aplicación para unirte a la comunidad SERVI.</p>
    </div>

    <form id="partner-form" style="display:flex;flex-direction:column;gap:16px">
      <div>
        <label style="display:block;font-weight:600;font-size:14px;margin-bottom:6px" data-i18n="partnerForm.labels.name">Nombre completo *</label>
        <input class="input-field" name="name" required>
      </div>
      <div>
        <label style="display:block;font-weight:600;font-size:14px;margin-bottom:6px" data-i18n="partnerForm.labels.phone">Teléfono (WhatsApp) *</label>
        <input class="input-field" name="phone" type="tel" required>
      </div>
      <div>
        <label style="display:block;font-weight:600;font-size:14px;margin-bottom:6px" data-i18n="partnerForm.labels.email">Correo electrónico</label>
        <input class="input-field" name="email" type="email">
      </div>
      <div>
        <label style="display:block;font-weight:600;font-size:14px;margin-bottom:6px" data-i18n="partnerForm.labels.specialty">Especialidad principal *</label>
        <select class="input-field" name="specialty" id="specialty-select" required onchange="onSpecialtyChange()">
          <option value="" data-i18n="partnerForm.specialty.placeholder">Selecciona...</option>
          <option value="cleaning" data-i18n="partnerForm.specialty.cleaning">Limpieza</option>
          <option value="repair" data-i18n="partnerForm.specialty.repair">Reparación y Mantenimiento</option>
          <option value="wellness" data-i18n="partnerForm.specialty.wellness">Bienestar y Cuidado Personal</option>
          <option value="maintenance" data-i18n="partnerForm.specialty.maintenance">Mantenimiento</option>
          <option value="supply" data-i18n="partnerForm.specialty.supply">Abastecimiento y Compras</option>
          <option value="other" data-i18n="partnerForm.specialty.other">Otro</option>
        </select>
        <div id="specialty-other-wrap" style="display:none;margin-top:8px">
          <input class="input-field" id="specialty-other" placeholder="Describe tu especialidad...">
        </div>
      </div>
      <div>
        <label style="display:block;font-weight:600;font-size:14px;margin-bottom:8px">Servicios adicionales que ofreces</label>
        <div style="display:flex;flex-direction:column;gap:8px">
          <label style="display:flex;align-items:center;gap:10px;font-size:14px;cursor:pointer"><input type="checkbox" name="svc_cleaning" value="cleaning" style="width:16px;height:16px;accent-color:#10b981"> Limpieza</label>
          <label style="display:flex;align-items:center;gap:10px;font-size:14px;cursor:pointer"><input type="checkbox" name="svc_repair" value="repair" style="width:16px;height:16px;accent-color:#10b981"> Reparación y Mantenimiento</label>
          <label style="display:flex;align-items:center;gap:10px;font-size:14px;cursor:pointer"><input type="checkbox" name="svc_wellness" value="wellness" style="width:16px;height:16px;accent-color:#10b981"> Bienestar y Cuidado Personal</label>
          <label style="display:flex;align-items:center;gap:10px;font-size:14px;cursor:pointer"><input type="checkbox" name="svc_maintenance" value="maintenance" style="width:16px;height:16px;accent-color:#10b981"> Mantenimiento</label>
          <label style="display:flex;align-items:center;gap:10px;font-size:14px;cursor:pointer"><input type="checkbox" name="svc_supply" value="supply" style="width:16px;height:16px;accent-color:#10b981"> Abastecimiento y Compras</label>
        </div>
      </div>
      <div>
        <label style="display:block;font-weight:600;font-size:14px;margin-bottom:6px">Áreas / colonias donde trabajas</label>
        <input class="input-field" name="coverage_areas" placeholder="Ej: Santa Fe, Cuajimalpa, Interlomas, Lomas de Chapultepec...">
        <p style="font-size:12px;color:#888;margin-top:4px">Separa las áreas con comas.</p>
      </div>
      <div>
        <label style="display:block;font-weight:600;font-size:14px;margin-bottom:6px" data-i18n="partnerForm.labels.city">Ciudad</label>
        <input class="input-field" name="city" data-i18n-placeholder="partnerForm.cityPlaceholder" placeholder="Ej: Ciudad de México">
      </div>
      <div>
        <label style="display:block;font-weight:600;font-size:14px;margin-bottom:6px" data-i18n="partnerForm.labels.experience">Describe tu experiencia</label>
        <textarea class="input-field" name="experience" rows="4" data-i18n-placeholder="partnerForm.experiencePlaceholder" placeholder="Cuéntanos sobre tu experiencia y especialidad..."></textarea>
      </div>
      <button type="submit" class="btn-partner" style="width:100%;justify-content:center;margin-top:8px" id="submit-btn" data-i18n="partnerForm.submit">Enviar aplicación</button>
    </form>
    <div id="form-msg" style="text-align:center;display:none"></div>
  </div>
</section>

<div id="footer"></div>
<script src="/shared/shared-footer.js"></script>

<script>
function onSpecialtyChange() {
  const val = document.getElementById('specialty-select')?.value;
  const wrap = document.getElementById('specialty-other-wrap');
  const input = document.getElementById('specialty-other');
  if (wrap) wrap.style.display = val === 'other' ? 'block' : 'none';
  if (input) input.required = val === 'other';
}

document.getElementById('partner-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const msg = document.getElementById('form-msg');
  const fd = new FormData(this);
  btn.disabled = true; btn.textContent = '...';
  try {
    const API = window.CONFIG?.API_BASE || '';
    console.log('[SERVI] Submitting partner application to:', API + '/api/partner-applications');
    // Resolve specialty (use free-text if "other" selected)
    let specialty = fd.get('specialty');
    if (specialty === 'other') {
      specialty = document.getElementById('specialty-other')?.value?.trim() || 'other';
    }
    // Collect additional services
    const serviceBoxes = document.querySelectorAll('input[name^="svc_"]:checked');
    const services = Array.from(serviceBoxes).map(cb => cb.value).join(', ') || null;
    const res = await fetch(API + '/api/partner-applications', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: fd.get('name'), phone: fd.get('phone'), email: fd.get('email'), specialty, city: fd.get('city'), experience: fd.get('experience'), services, coverage_areas: fd.get('coverage_areas') || null }),
    });
    const data = await res.json().catch(() => ({}));
    console.log('[SERVI] API response:', res.status, data);
    if (!res.ok) {
      throw new Error(data.message || data.error || 'HTTP ' + res.status);
    }
    console.log('[SERVI] Partner application submitted successfully');
    this.style.display = 'none';
    document.getElementById('page-header').style.display = 'none';
    msg.style.display = 'block';
    const tr = window.__t?.partnerForm;
    msg.innerHTML = '<div style="padding:32px 0;text-align:center"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--color-accent, #95ccd5)" stroke-width="2" stroke-linecap="round" style="margin:0 auto;display:block"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg><h3 class="heading-md" style="margin:16px 0 8px" data-i18n="partnerForm.successTitle">Aplicación enviada</h3><p class="text-body" style="margin-bottom:24px" data-i18n="partnerForm.successBody">Gracias por tu interés. Te contactaremos pronto.</p><a href="/partners.html" class="btn-partner" style="display:inline-block;text-decoration:none" data-i18n="partnerForm.backButton">Volver a Partners</a></div>';
    if (window.updateTranslations) window.updateTranslations();
  } catch (err) {
    console.error('[SERVI] Partner application submission error:', err);
    const tr = window.__t?.partnerForm;
    btn.disabled = false; btn.textContent = tr?.submit || 'Enviar aplicación';
    alert(tr?.error || 'Error: ' + err.message);
  }
});
</script>
<!-- Motion layer (visual only) -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js" defer></script>
<script src="/shared/motion.js" defer></script>
</body>
</html>
