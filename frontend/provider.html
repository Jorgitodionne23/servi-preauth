<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SERVI · Panel del especialista</title>
  <script src="./config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #0b0b0c; --panel: #151517; --panel-2: #1d1d20; --line: #2a2a2e;
      --text: #f5f5f7; --muted: #9a9aa2; --brand: #95ccd5; --ok: #34c759;
      --warn: #ffc861; --danger: #ff6b6b; --spring: cubic-bezier(0.16,1,0.3,1);
    }
    body {
      background: var(--bg); color: var(--text); margin: 0; line-height: 1.55;
      font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      -webkit-font-smoothing: antialiased; min-height: 100vh;
    }
    .wrap { max-width: 480px; margin: 0 auto; padding: 22px 18px 28px; min-height: 100vh; display: flex; flex-direction: column; }
    .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .logo { font-family: "Outfit","Inter",sans-serif; font-weight: 800; font-size: 26px; letter-spacing: -0.01em; }
    .logo-dot { color: var(--brand); }
    .lang { background: transparent; border: 1px solid var(--line); color: var(--muted);
      border-radius: 999px; padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .lang:hover { border-color: var(--brand); color: var(--text); }

    /* Cards & rows */
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 18px;
      padding: 18px; margin-bottom: 16px; }
    .eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 8px; }
    .code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--brand); font-weight: 600; }
    .row { display: flex; gap: 10px; align-items: flex-start; padding: 7px 0; font-size: 14px; }
    .row .k { color: var(--muted); min-width: 88px; flex-shrink: 0; }
    .row .v { color: var(--text); }
    .row .v a { color: var(--brand); text-decoration: none; }
    h2 { font-size: 15px; margin: 0 0 14px; font-weight: 600; }

    /* Timeline */
    .timeline { display: flex; flex-direction: column; margin: 2px 0; }
    .tl-step { position: relative; display: flex; align-items: center; gap: 12px; padding: 9px 0; }
    .tl-step::before { content: ""; position: absolute; left: 8px; top: 27px; bottom: -9px; width: 2px; background: var(--line); }
    .tl-step:last-child::before { display: none; }
    .tl-dot { width: 18px; height: 18px; border-radius: 999px; border: 2px solid var(--line);
      background: var(--panel-2); flex-shrink: 0; z-index: 1; display: flex; align-items: center;
      justify-content: center; transition: background .3s var(--spring), border-color .3s var(--spring), box-shadow .3s var(--spring); }
    .tl-step.done .tl-dot { background: var(--ok); border-color: var(--ok); }
    .tl-step.done .tl-dot::after { content: "✓"; color: #06231a; font-size: 11px; font-weight: 800; line-height: 1; }
    .tl-step.current .tl-dot { background: var(--brand); border-color: var(--brand); box-shadow: 0 0 0 4px rgba(149,204,213,.18); }
    .tl-label { flex: 1; font-size: 14px; font-weight: 600; }
    .tl-step.upcoming .tl-label { color: var(--muted); font-weight: 500; }
    .tl-time { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }

    /* Contextual phase tools (inside status card) */
    .phase-tools { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line); display: flex; flex-direction: column; gap: 10px; }
    .tool-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%;
      background: var(--panel-2); border: 1.5px solid var(--line); color: var(--text); border-radius: 14px;
      padding: 13px; font-size: 14px; font-weight: 600; text-decoration: none; min-height: 48px;
      cursor: pointer; transition: border-color .15s; font-family: inherit; }
    .tool-btn:hover { border-color: var(--brand); }
    .tool-hint { font-size: 12px; color: var(--muted); margin: 0; }
    .link-btn { background: none; border: none; color: var(--brand); font-size: 13px; font-weight: 600;
      cursor: pointer; padding: 6px 2px; font-family: inherit; }
    .link-btn.alone { align-self: flex-start; }
    .loc-btn { width: 100%; background: transparent; border: 1.5px solid var(--line); color: var(--text);
      border-radius: 14px; padding: 14px; font-size: 14px; font-weight: 600; cursor: pointer; min-height: 48px; }
    .loc-btn:hover { border-color: var(--brand); }
    .loc-btn:disabled { opacity: .55; cursor: default; }
    .loc-confirmed { display: flex; align-items: center; justify-content: space-between; gap: 10px;
      background: rgba(52,199,89,.10); border: 1.5px solid rgba(52,199,89,.4); color: var(--ok);
      border-radius: 14px; padding: 12px 14px; font-size: 13px; font-weight: 600; }
    .loc-confirmed .link-btn { color: var(--muted); flex-shrink: 0; }

    /* Sticky action bar (single primary next-step CTA) */
    .action-bar { position: sticky; bottom: 0; z-index: 50; margin-top: auto;
      background: linear-gradient(to top, var(--bg) 70%, rgba(11,11,12,0));
      padding: 16px 0 calc(10px + env(safe-area-inset-bottom)); }
    .action-inner { display: flex; flex-direction: column; gap: 9px; }
    .action-label { font-size: 13px; color: var(--muted); font-weight: 600; text-align: center; }
    .timer { color: var(--brand); font-variant-numeric: tabular-nums; font-weight: 700; }
    .price-btn { width: 100%; background: var(--brand); color: #06262b; border: none;
      border-radius: 14px; padding: 15px; font-size: 15px; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: filter .15s, transform .05s; }
    .price-btn:hover { filter: brightness(1.05); }
    .price-btn:active { transform: scale(0.99); }
    .price-btn:disabled { opacity: .6; cursor: default; }
    .price-btn.finish { background: var(--ok); color: #06231a; }
    .action-bar .price-btn { min-height: 54px; font-size: 16px; }

    /* Price-change card */
    .price-btn.block { display: block; }
    .pc-field { margin-bottom: 12px; }
    .pc-field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .pc-field input, .pc-field select, .pc-field textarea {
      width: 100%; background: var(--panel-2); border: 1.5px solid var(--line); color: var(--text);
      border-radius: 12px; padding: 12px; font-size: 16px; font-family: inherit; }
    .pc-field textarea { resize: vertical; min-height: 64px; }
    .pc-field input:disabled, .pc-field select:disabled, .pc-field textarea:disabled { cursor: not-allowed; }
    .hint { font-size: 12px; color: var(--muted); margin-top: 10px; }
    .card.locked h2 { color: var(--muted); }
    .card.locked .pc-field, .card.locked .price-btn { opacity: .5; }
    .lock-note { font-size: 12px; color: var(--warn); margin: 0 0 14px; }
    .preview { background: var(--panel-2); border: 1px solid var(--line); border-radius: 12px;
      padding: 12px; margin-top: 12px; font-size: 13px; display: none; }
    .preview .big { font-size: 18px; font-weight: 700; color: var(--text); }

    /* Submitted price-change list */
    .pc-list { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line); }
    .chg-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 12px; }
    .chg-list li { display: flex; flex-direction: column; gap: 2px; font-size: 13px; }
    .chg-type { font-weight: 600; color: var(--text); }
    .chg-amt { color: var(--brand); font-weight: 600; }
    .chg-note { color: var(--muted); font-size: 12px; }

    /* Completed banner */
    .done-banner { text-align: center; border-color: rgba(52,199,89,.4); background: rgba(52,199,89,.06); }
    .db-ico { font-size: 42px; line-height: 1; }
    .db-title { font-size: 18px; font-weight: 700; margin-top: 8px; }
    .db-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .db-dur { font-size: 13px; color: var(--brand); font-weight: 600; margin-top: 12px; }

    /* Finish bottom-sheet */
    .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 200; opacity: 0;
      transition: opacity .26s ease; display: flex; align-items: flex-end; justify-content: center; }
    .sheet-overlay.show { opacity: 1; }
    .sheet { width: 100%; max-width: 480px; background: var(--panel); border-radius: 22px 22px 0 0;
      padding: 10px 20px calc(22px + env(safe-area-inset-bottom)); transform: translateY(100%);
      transition: transform .3s var(--spring); max-height: 92vh; overflow-y: auto; }
    .sheet-overlay.show .sheet { transform: translateY(0); }
    .sheet-handle { width: 40px; height: 4px; border-radius: 999px; background: var(--line); margin: 4px auto 16px; }
    .sheet-title { font-size: 19px; font-weight: 700; margin: 0 0 6px; }
    .sheet-sub { font-size: 13px; color: var(--muted); margin: 0 0 16px; }
    .sheet-rows { display: flex; flex-direction: column; gap: 2px; margin-bottom: 14px; }
    .sheet-row { display: flex; justify-content: space-between; gap: 10px; font-size: 14px; padding: 4px 0; }
    .sheet-row .k { color: var(--muted); }
    .sheet-row .v { text-align: right; }
    .sheet-changes { background: var(--panel-2); border: 1px solid var(--line); border-radius: 14px; padding: 14px; margin-bottom: 14px; }
    .sheet-changes-label { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 10px; }
    .sheet-disc { font-size: 12px; color: var(--muted); margin: 0 0 16px; }
    .ghost-btn { width: 100%; background: transparent; border: 1.5px solid var(--line); color: var(--text);
      border-radius: 14px; padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 10px;
      min-height: 50px; font-family: inherit; }
    .ghost-btn:hover { border-color: var(--muted); }

    /* Toast & misc */
    .toast { position: fixed; left: 50%; top: calc(14px + env(safe-area-inset-top)); bottom: auto; transform: translateX(-50%) translateY(-20px);
      background: #fff; color: #111; padding: 12px 18px; border-radius: 12px; font-size: 14px; font-weight: 600;
      opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; max-width: 90vw; box-shadow: 0 8px 30px rgba(0,0,0,.4); z-index: 300; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.err { background: #ff6b6b; color: #fff; }
    .toast.ok { background: #34c759; color: #fff; }
    .center-msg { text-align: center; color: var(--muted); padding: 60px 20px; }
    .hidden { display: none !important; }

    /* Loading skeleton */
    .sk-card { background: var(--panel); border: 1px solid var(--line); border-radius: 18px; padding: 18px; margin-bottom: 16px; }
    .sk-line { height: 12px; border-radius: 6px; margin: 12px 0;
      background: linear-gradient(90deg, var(--panel-2) 25%, #2c2c31 37%, var(--panel-2) 63%);
      background-size: 400% 100%; animation: shimmer 1.4s ease infinite; }
    .sk-line.short { width: 45%; } .sk-line.mid { width: 72%; }
    @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

    .reveal { animation: fadeUp .35s var(--spring) both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <span class="logo">SERVI<span class="logo-dot">.</span></span>
      <button class="lang" id="langBtn">EN</button>
    </div>
    <div id="content">
      <div id="loading">
        <div class="sk-card"><div class="sk-line short"></div><div class="sk-line mid"></div><div class="sk-line"></div></div>
        <div class="sk-card"><div class="sk-line short"></div><div class="sk-line"></div><div class="sk-line mid"></div></div>
      </div>
    </div>
    <div class="action-bar hidden" id="actionBar"></div>
  </div>

  <div class="sheet-overlay hidden" id="sheetOverlay" role="dialog" aria-modal="true">
    <div class="sheet" id="sheet"></div>
  </div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const API = (window.CONFIG && window.CONFIG.API_BASE) || window.location.origin;
    const params = new URLSearchParams(location.search);
    const ORDER = params.get('order') || '';
    const PT = params.get('pt') || '';

    const PHASES = ['en_route', 'arrived', 'started', 'completed'];
    const PHASE_RANK = { en_route: 1, arrived: 2, started: 3, completed: 4 };
    const NEXT_PHASE = { none: 'en_route', en_route: 'arrived', arrived: 'started', started: 'completed' };

    let order = null;
    let phaseTimes = {};   // { phase: ms }
    let locShared = null;  // ms timestamp of last share
    let myChanges = [];    // [{ type, amount(pesos), note, previewTotalCents, at }]
    let busy = false;      // guards the advance CTA
    let timerInterval = null;

    /* ---------- Language (always-default Spanish + persistence) ---------- */
    function readLang() {
      try { const v = localStorage.getItem('servi-lang'); if (v === 'en' || v === 'es') return v; } catch (_) {}
      return 'es';   // ES is ALWAYS the default — navigator.language is no longer consulted
    }
    let lang = readLang();
    function setLang(next) {
      lang = (next === 'en') ? 'en' : 'es';
      try { localStorage.setItem('servi-lang', lang); } catch (_) {}
      document.documentElement.lang = lang;
      document.getElementById('langBtn').textContent = (lang === 'es') ? 'EN' : 'ES';
    }

    const T = {
      es: {
        panel: 'Panel del especialista', order: 'Orden', service: 'Servicio', address: 'Dirección',
        when: 'Cuándo', client: 'Cliente', asap: 'Lo antes posible', map: 'Ver en mapa',
        statusTitle: 'Estado del trabajo', summaryTitle: 'Resumen del trabajo',
        ph_en_route: 'En camino', ph_arrived: 'En el sitio', ph_started: 'En curso', ph_completed: 'Terminado',
        bar_none: '¿Listo para empezar?', bar_en_route: 'Vas en camino', bar_arrived: 'Llegaste al sitio', bar_started: 'Trabajo en curso',
        cta_en_route: 'Voy en camino', cta_arrived: 'Ya llegué', cta_started: '▶ Iniciar trabajo', cta_completed: '✓ Terminar trabajo',
        directions: 'Cómo llegar',
        shareLoc: '📍 Compartir mi ubicación', sharing: 'Compartiendo…', shared: '✓ Ubicación compartida',
        locSharedAt: 'Compartida a las', reshare: 'Volver a compartir', shareAgain: '📍 Compartir ubicación de nuevo',
        locHint: 'El cliente podrá ver que vas en camino.',
        startedHint: 'Si el trabajo requiere un costo adicional, agrégalo abajo.',
        priceTitle: 'Proponer cambio de precio',
        priceIntro: 'Si el trabajo requiere un costo adicional, propónlo aquí. El cliente lo aprueba y SERVI realiza el cobro — sin acuerdos por fuera.',
        priceLocked: 'Disponible cuando inicies el trabajo. Marca "Iniciar trabajo" para proponer un costo adicional.',
        priceSummaryTitle: 'Cambios de precio que propusiste',
        type: 'Tipo de cambio', amount: 'Costo adicional (MXN)', note: 'Detalle (opcional)',
        send: 'Enviar propuesta', sending: 'Enviando…',
        t_precio_corregido: 'Corrección de precio', t_horas_adicionales: 'Horas adicionales',
        t_servicio_adicional: 'Servicio adicional', t_materiales: 'Materiales', t_otro: 'Otro',
        clientSees: 'el cliente verá',
        notFound: 'No encontramos esta orden. Verifica tu enlace.',
        checkSaved: '✓ Registrado', locDenied: 'No se pudo obtener tu ubicación.',
        priceSent: '✓ Propuesta enviada. El equipo SERVI la procesará.',
        amountErr: 'Ingresa un monto válido.', genErr: 'Algo salió mal. Intenta de nuevo.',
        previewTotal: 'El cliente verá un total adicional aproximado de',
        doneTitle: 'Trabajo terminado', doneSub: 'Gracias. SERVI confirmará el cobro con el cliente.',
        duration: 'Duración', startedAt: 'Inicio',
        finishTitle: '¿Terminar el trabajo?', finishSubtitle: 'Confirma que completaste la orden {code}.',
        finishChangesLabel: 'Cambios de precio que propusiste', finishNoChanges: 'No propusiste cambios de precio.',
        finishDisclaimer: 'SERVI confirmará el cobro con el cliente. Esta acción no se puede deshacer.',
        finishConfirm: 'Sí, terminé', finishCancel: 'Cancelar'
      },
      en: {
        panel: 'Specialist panel', order: 'Order', service: 'Service', address: 'Address',
        when: 'When', client: 'Client', asap: 'As soon as possible', map: 'View on map',
        statusTitle: 'Job status', summaryTitle: 'Job summary',
        ph_en_route: 'On the way', ph_arrived: 'On site', ph_started: 'In progress', ph_completed: 'Completed',
        bar_none: 'Ready to start?', bar_en_route: 'On your way', bar_arrived: 'You arrived', bar_started: 'Work in progress',
        cta_en_route: "I'm on my way", cta_arrived: "I've arrived", cta_started: '▶ Start work', cta_completed: '✓ Finish work',
        directions: 'Get directions',
        shareLoc: '📍 Share my location', sharing: 'Sharing…', shared: '✓ Location shared',
        locSharedAt: 'Shared at', reshare: 'Share again', shareAgain: '📍 Share location again',
        locHint: 'The client will be able to see you are on the way.',
        startedHint: 'If the job needs an extra cost, add it below.',
        priceTitle: 'Propose a price change',
        priceIntro: 'If the job needs an extra cost, propose it here. The client approves it and SERVI charges it — no side deals.',
        priceLocked: 'Available once you start the job. Tap "Start work" to propose an additional cost.',
        priceSummaryTitle: 'Price changes you proposed',
        type: 'Type of change', amount: 'Additional cost (MXN)', note: 'Details (optional)',
        send: 'Send proposal', sending: 'Sending…',
        t_precio_corregido: 'Price correction', t_horas_adicionales: 'Additional hours',
        t_servicio_adicional: 'Additional service', t_materiales: 'Materials', t_otro: 'Other',
        clientSees: 'the client will see',
        notFound: 'We could not find this order. Check your link.',
        checkSaved: '✓ Saved', locDenied: 'Could not get your location.',
        priceSent: '✓ Proposal sent. The SERVI team will process it.',
        amountErr: 'Enter a valid amount.', genErr: 'Something went wrong. Try again.',
        previewTotal: 'The client will see an approximate additional total of',
        doneTitle: 'Job completed', doneSub: 'Thank you. SERVI will confirm the charge with the client.',
        duration: 'Duration', startedAt: 'Started',
        finishTitle: 'Finish the job?', finishSubtitle: 'Confirm you completed order {code}.',
        finishChangesLabel: 'Price changes you proposed', finishNoChanges: 'You proposed no price changes.',
        finishDisclaimer: "SERVI will confirm the charge with the client. This can't be undone.",
        finishConfirm: "Yes, I'm done", finishCancel: 'Cancel'
      }
    };
    const tr = (k) => (T[lang] && T[lang][k]) || k;

    /* ---------- Helpers ---------- */
    function toast(msg, kind) {
      const el = document.getElementById('toast');
      el.textContent = msg; el.className = 'toast show' + (kind ? ' ' + kind : '');
      clearTimeout(el._t); el._t = setTimeout(() => { el.className = 'toast'; }, 3200);
    }
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function locale() { return lang === 'en' ? 'en-US' : 'es-MX'; }
    function money(cents) { return '$' + (cents / 100).toLocaleString(locale(), { minimumFractionDigits: 2 }) + ' MXN'; }
    function fmtTime(ts) {
      if (!ts) return '';
      const d = new Date(ts); if (isNaN(d)) return '';
      return d.toLocaleTimeString(locale(), { hour: '2-digit', minute: '2-digit' });
    }
    function fmtDuration(ms) {
      if (!ms || ms < 0) return '';
      const totalMin = Math.floor(ms / 60000), h = Math.floor(totalMin / 60), m = totalMin % 60;
      return h > 0 ? (h + 'h ' + (m < 10 ? '0' : '') + m + 'm') : (m + 'm');
    }
    function fmtTimer(ms) {
      if (!ms || ms < 0) ms = 0;
      const s = Math.floor(ms / 1000), p = n => (n < 10 ? '0' : '') + n;
      return p(Math.floor(s / 3600)) + ':' + p(Math.floor((s % 3600) / 60)) + ':' + p(s % 60);
    }
    function fmtWhen(o) {
      if (o.isAsap && !o.serviceDateTime) return tr('asap');
      const raw = o.serviceDateTime || o.serviceDate;
      if (!raw) return '—';
      const d = new Date(raw.length <= 10 ? raw + 'T00:00:00' : raw);
      if (isNaN(d)) return raw;
      const date = d.toLocaleDateString(locale(), { day: 'numeric', month: 'short', year: 'numeric' });
      if (raw.length <= 10) return date;
      return date + ' · ' + d.toLocaleTimeString(locale(), { hour: '2-digit', minute: '2-digit' });
    }

    async function api(path, opts) {
      const res = await fetch(API + path, Object.assign({ headers: { 'Content-Type': 'application/json' } }, opts));
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw Object.assign(new Error(data.error || 'error'), { data });
      return data;
    }

    /* ---------- Load + hydrate ---------- */
    async function load() {
      if (!ORDER || !PT) { renderNotFound(); return; }
      try {
        const data = await api('/api/provider/order?order=' + encodeURIComponent(ORDER) + '&pt=' + encodeURIComponent(PT));
        order = data.order;
        hydrate(order);
        render();
      } catch (e) { renderNotFound(); }
    }
    function hydrate(o) {
      // Reload-safe data from the backend (pricing-safe: provider's own milestones + surcharges only).
      if (o.phaseTimes) {
        for (const p of PHASES) {
          const v = o.phaseTimes[p];
          if (v) { const t = Date.parse(v); if (!isNaN(t)) phaseTimes[p] = t; }
        }
      }
      if (o.locationSharedAt) { const t = Date.parse(o.locationSharedAt); if (!isNaN(t)) locShared = t; }
      if (Array.isArray(o.myPriceChanges)) {
        myChanges = o.myPriceChanges.map(c => ({
          type: c.type || 'otro',
          amount: (c.providerPesos != null) ? c.providerPesos : null,
          note: c.note || null,
          previewTotalCents: (c.previewTotal != null) ? c.previewTotal : null,
          at: c.at ? Date.parse(c.at) : null,
        }));
      }
    }
    function renderNotFound() {
      document.getElementById('content').innerHTML = '<div class="center-msg">' + esc(tr('notFound')) + '</div>';
      const bar = document.getElementById('actionBar'); bar.classList.add('hidden'); bar.innerHTML = '';
    }

    /* ---------- Render pieces ---------- */
    function renderTimeline(curRank) {
      const items = PHASES.map(p => {
        const r = PHASE_RANK[p];
        // When the job is completed, the final step reads as done (✓), not "current".
        const state = r < curRank ? 'done' : (r === curRank ? (curRank === 4 ? 'done' : 'current') : 'upcoming');
        const t = phaseTimes[p] ? fmtTime(phaseTimes[p]) : '';
        return '<div class="tl-step ' + state + '">' +
            '<span class="tl-dot"></span>' +
            '<span class="tl-label">' + esc(tr('ph_' + p)) + '</span>' +
            '<span class="tl-time">' + esc(t) + '</span>' +
          '</div>';
      }).join('');
      return '<div class="timeline">' + items + '</div>';
    }

    function locActionHtml() {
      if (locShared) {
        return '<div class="loc-confirmed"><span>✓ ' + esc(tr('locSharedAt')) + ' ' + esc(fmtTime(locShared)) + '</span>' +
               '<button class="link-btn" id="reshareBtn">' + esc(tr('reshare')) + '</button></div>';
      }
      return '<button class="loc-btn" id="locBtn">' + esc(tr('shareLoc')) + '</button>';
    }

    function renderPhaseTools(o) {
      const cur = o.servicePhase || 'none';
      const mapHref = o.serviceAddress ? 'https://maps.google.com/?q=' + encodeURIComponent(o.serviceAddress) : '';
      let html = '';
      if (cur === 'en_route') {
        if (mapHref) html += '<a class="tool-btn" href="' + mapHref + '" target="_blank" rel="noopener">🧭 ' + esc(tr('directions')) + '</a>';
        html += locActionHtml();
        html += '<p class="tool-hint">' + esc(tr('locHint')) + '</p>';
      } else if (cur === 'arrived') {
        if (locShared) {
          html += '<div class="loc-confirmed"><span>✓ ' + esc(tr('locSharedAt')) + ' ' + esc(fmtTime(locShared)) + '</span>' +
                  '<button class="link-btn" id="reshareBtn">' + esc(tr('reshare')) + '</button></div>';
        } else {
          html += '<button class="link-btn alone" id="reshareBtn">' + esc(tr('shareAgain')) + '</button>';
        }
      } else if (cur === 'started') {
        html += '<p class="tool-hint">' + esc(tr('startedHint')) + '</p>';
      }
      return html ? '<div class="phase-tools">' + html + '</div>' : '';
    }

    function myChangesSummaryHtml() {
      if (!myChanges.length) return '<p class="hint" style="margin-top:0">' + esc(tr('finishNoChanges')) + '</p>';
      return '<ul class="chg-list">' + myChanges.map(c => {
        const amt = (c.previewTotalCents != null) ? (esc(tr('clientSees')) + ' +' + esc(money(c.previewTotalCents))) : '';
        return '<li><span class="chg-type">' + esc(tr('t_' + c.type)) + '</span>' +
          (amt ? '<span class="chg-amt">' + amt + '</span>' : '') +
          (c.note ? '<span class="chg-note">' + esc(c.note) + '</span>' : '') + '</li>';
      }).join('') + '</ul>';
    }

    function renderPriceCard(o, curRank) {
      const cur = o.servicePhase || 'none';
      if (cur === 'completed') {
        return '<div class="card reveal"><h2>' + esc(tr('priceSummaryTitle')) + '</h2>' + myChangesSummaryHtml() + '</div>';
      }
      const locked = curRank < PHASE_RANK.started;
      const types = ['precio_corregido', 'horas_adicionales', 'servicio_adicional', 'materiales', 'otro'];
      const typeOpts = types.map(t => '<option value="' + t + '">' + esc(tr('t_' + t)) + '</option>').join('');
      const dis = locked ? ' disabled aria-disabled="true"' : '';
      return '<div class="card' + (locked ? ' locked' : '') + '">' +
        '<h2>' + (locked ? '🔒 ' : '') + esc(tr('priceTitle')) + '</h2>' +
        (locked
          ? '<p class="lock-note">' + esc(tr('priceLocked')) + '</p>'
          : '<p class="hint" style="margin-top:0">' + esc(tr('priceIntro')) + '</p>') +
        '<div class="pc-field"><label>' + esc(tr('type')) + '</label><select id="pcType"' + dis + '>' + typeOpts + '</select></div>' +
        '<div class="pc-field"><label>' + esc(tr('amount')) + '</label><input id="pcAmount" type="number" inputmode="decimal" min="1" placeholder="0"' + dis + ' /></div>' +
        '<div class="pc-field"><label>' + esc(tr('note')) + '</label><textarea id="pcNote" maxlength="500"' + dis + '></textarea></div>' +
        '<button class="price-btn block" id="pcSend"' + dis + '>' + esc(tr('send')) + '</button>' +
        '<div class="preview" id="pcPreview"></div>' +
        (myChanges.length ? '<div class="pc-list">' + myChangesSummaryHtml() + '</div>' : '') +
      '</div>';
    }

    function renderActionBar(o) {
      const cur = o.servicePhase || 'none';
      if (cur === 'completed') return '';
      const next = NEXT_PHASE[cur];
      if (!next) return '';
      const finishCls = (next === 'completed') ? ' finish' : '';
      let timer = '';
      if (cur === 'started' && phaseTimes.started) {
        timer = ' · <span class="timer" id="svcTimer">' + esc(fmtTimer(Date.now() - phaseTimes.started)) + '</span>';
      }
      return '<div class="action-inner">' +
          '<div class="action-label">' + esc(tr('bar_' + cur)) + timer + '</div>' +
          '<button class="price-btn' + finishCls + '" id="advanceBtn" data-next="' + next + '">' + esc(tr('cta_' + next)) + '</button>' +
        '</div>';
    }

    function render() {
      const o = order;
      const curRank = PHASE_RANK[o.servicePhase] || 0;
      const done = o.servicePhase === 'completed';
      const mapHref = o.serviceAddress ? 'https://maps.google.com/?q=' + encodeURIComponent(o.serviceAddress) : '';

      const jobCard =
        '<div class="card">' +
          '<div class="eyebrow">' + esc(tr('panel')) + '</div>' +
          '<div class="row"><span class="k">' + esc(tr('order')) + '</span><span class="v code">' + esc(o.publicCode || '—') + '</span></div>' +
          (o.serviceDescription ? '<div class="row"><span class="k">' + esc(tr('service')) + '</span><span class="v">' + esc(o.serviceDescription) + '</span></div>' : '') +
          '<div class="row"><span class="k">' + esc(tr('address')) + '</span><span class="v">' + esc(o.serviceAddress || '—') +
            (mapHref ? ' · <a href="' + mapHref + '" target="_blank" rel="noopener">' + esc(tr('map')) + '</a>' : '') + '</span></div>' +
          '<div class="row"><span class="k">' + esc(tr('when')) + '</span><span class="v">' + esc(fmtWhen(o)) + '</span></div>' +
          (o.clientFirstName ? '<div class="row"><span class="k">' + esc(tr('client')) + '</span><span class="v">' + esc(o.clientFirstName) + '</span></div>' : '') +
        '</div>';

      const doneBanner = done
        ? '<div class="card done-banner reveal"><div class="db-ico">✅</div>' +
          '<div class="db-title">' + esc(tr('doneTitle')) + '</div>' +
          '<div class="db-sub">' + esc(tr('doneSub')) + '</div>' +
          ((phaseTimes.started && phaseTimes.completed)
            ? '<div class="db-dur">' + esc(tr('duration')) + ' ' + esc(fmtDuration(phaseTimes.completed - phaseTimes.started)) + '</div>' : '') +
          '</div>'
        : '';

      const statusCard =
        '<div class="card">' +
          '<h2>' + esc(done ? tr('summaryTitle') : tr('statusTitle')) + '</h2>' +
          renderTimeline(curRank) +
          (done ? '' : renderPhaseTools(o)) +
        '</div>';

      document.getElementById('content').innerHTML = jobCard + doneBanner + statusCard + renderPriceCard(o, curRank);

      const bar = document.getElementById('actionBar');
      const barHtml = renderActionBar(o);
      if (barHtml) { bar.innerHTML = barHtml; bar.classList.remove('hidden'); }
      else { bar.innerHTML = ''; bar.classList.add('hidden'); }

      // (Re)bind dynamic controls.
      const locBtn = document.getElementById('locBtn'); if (locBtn) locBtn.addEventListener('click', shareLocation);
      const reshareBtn = document.getElementById('reshareBtn'); if (reshareBtn) reshareBtn.addEventListener('click', shareLocation);
      const advBtn = document.getElementById('advanceBtn'); if (advBtn) advBtn.addEventListener('click', () => advance(advBtn.dataset.next));
      const pcSend = document.getElementById('pcSend'); if (pcSend && !pcSend.disabled) pcSend.addEventListener('click', sendPriceChange);

      syncTimer();
    }

    function syncTimer() {
      clearInterval(timerInterval); timerInterval = null;
      if (order && order.servicePhase === 'started' && phaseTimes.started) {
        timerInterval = setInterval(() => {
          const el = document.getElementById('svcTimer');
          if (!el) { clearInterval(timerInterval); timerInterval = null; return; }
          el.textContent = fmtTimer(Date.now() - phaseTimes.started);
        }, 1000);
      }
    }

    /* ---------- Actions ---------- */
    async function advance(next) {
      if (busy) return;
      if (next === 'completed') { openFinishSheet(); return; }
      busy = true;
      const btn = document.getElementById('advanceBtn');
      if (btn) btn.disabled = true;
      try { await checkin(next); }
      catch (e) { if (btn) btn.disabled = false; }
      finally { busy = false; }
    }

    async function checkin(phase) {
      await api('/api/provider/checkin', { method: 'POST', body: JSON.stringify({ order: ORDER, pt: PT, event: phase }) });
      if (!phaseTimes[phase]) phaseTimes[phase] = Date.now();
      order.servicePhase = phase;
      render();
      toast(tr('checkSaved'), 'ok');
    }

    function shareLocation() {
      if (!navigator.geolocation) { toast(tr('locDenied'), 'err'); return; }
      const btn = document.getElementById('locBtn');
      if (btn) { btn.disabled = true; btn.textContent = tr('sharing'); }
      navigator.geolocation.getCurrentPosition(async (pos) => {
        try {
          await api('/api/provider/location', { method: 'POST', body: JSON.stringify({
            order: ORDER, pt: PT, lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy
          }) });
          locShared = Date.now();
          render();
          toast(tr('shared'), 'ok');
        } catch (e) {
          if (btn) { btn.disabled = false; btn.textContent = tr('shareLoc'); }
          toast(tr('genErr'), 'err');
        }
      }, () => {
        if (btn) { btn.disabled = false; btn.textContent = tr('shareLoc'); }
        toast(tr('locDenied'), 'err');
      }, { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 });
    }

    async function sendPriceChange() {
      const amount = Number(document.getElementById('pcAmount').value);
      const type = document.getElementById('pcType').value;
      const note = document.getElementById('pcNote').value;
      if (!Number.isFinite(amount) || amount <= 0) { toast(tr('amountErr'), 'err'); return; }
      const btn = document.getElementById('pcSend');
      btn.disabled = true; btn.textContent = tr('sending');
      try {
        const data = await api('/api/provider/price-change', { method: 'POST', body: JSON.stringify({
          order: ORDER, pt: PT, amount, type, note
        }) });
        const previewTotalCents = (data && data.preview && data.preview.total != null) ? data.preview.total : null;
        myChanges.push({ type, amount, note: note || null, previewTotalCents, at: Date.now() });
        render();   // refreshes the submitted-changes list
        if (previewTotalCents != null) {
          const prev = document.getElementById('pcPreview');
          if (prev) {
            prev.style.display = 'block';
            prev.innerHTML = esc(tr('previewTotal')) + '<br><span class="big">' + esc(money(previewTotalCents)) + '</span>';
          }
        }
        toast(tr('priceSent'), 'ok');
      } catch (e) {
        toast(tr('genErr'), 'err');
        const b = document.getElementById('pcSend'); if (b) { b.disabled = false; b.textContent = tr('send'); }
      }
    }

    /* ---------- Finish bottom-sheet ---------- */
    function sheetRow(k, v) { return '<div class="sheet-row"><span class="k">' + esc(k) + '</span><span class="v">' + esc(v) + '</span></div>'; }

    function openFinishSheet() {
      const o = order;
      const startTs = phaseTimes.started || null;
      const dur = startTs ? fmtDuration(Date.now() - startTs) : '';
      const rows = [];
      if (o.serviceDescription) rows.push(sheetRow(tr('service'), o.serviceDescription));
      if (o.clientFirstName) rows.push(sheetRow(tr('client'), o.clientFirstName));
      if (startTs) rows.push(sheetRow(tr('startedAt'), fmtTime(startTs) + (dur ? ' · ' + tr('duration') + ' ' + dur : '')));

      document.getElementById('sheet').innerHTML =
        '<div class="sheet-handle"></div>' +
        '<h2 class="sheet-title">' + esc(tr('finishTitle')) + '</h2>' +
        '<p class="sheet-sub">' + esc(tr('finishSubtitle').replace('{code}', o.publicCode || '')) + '</p>' +
        (rows.length ? '<div class="sheet-rows">' + rows.join('') + '</div>' : '') +
        '<div class="sheet-changes"><div class="sheet-changes-label">' + esc(tr('finishChangesLabel')) + '</div>' + myChangesSummaryHtml() + '</div>' +
        '<p class="sheet-disc">' + esc(tr('finishDisclaimer')) + '</p>' +
        '<button class="price-btn finish" id="confirmFinishBtn">' + esc(tr('finishConfirm')) + '</button>' +
        '<button class="ghost-btn" id="cancelFinishBtn">' + esc(tr('finishCancel')) + '</button>';

      const overlay = document.getElementById('sheetOverlay');
      overlay.classList.remove('hidden');
      requestAnimationFrame(() => overlay.classList.add('show'));
      document.getElementById('confirmFinishBtn').addEventListener('click', confirmFinish);
      document.getElementById('cancelFinishBtn').addEventListener('click', closeSheet);
      document.body.style.overflow = 'hidden';
      document.addEventListener('keydown', onSheetKey);
      setTimeout(() => { const c = document.getElementById('confirmFinishBtn'); if (c) c.focus(); }, 60);
    }

    function onSheetKey(e) {
      if (e.key === 'Escape') { closeSheet(); return; }
      if (e.key === 'Tab') {
        const f = document.getElementById('sheet').querySelectorAll('button, a[href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
        if (!f.length) return;
        const first = f[0], last = f[f.length - 1];
        if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
        else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
      }
    }

    function closeSheet() {
      const overlay = document.getElementById('sheetOverlay');
      overlay.classList.remove('show');
      setTimeout(() => overlay.classList.add('hidden'), 280);
      document.body.style.overflow = '';
      document.removeEventListener('keydown', onSheetKey);
    }

    async function confirmFinish() {
      const btn = document.getElementById('confirmFinishBtn');
      if (btn) { btn.disabled = true; btn.textContent = tr('sending'); }
      try { await checkin('completed'); closeSheet(); }
      catch (e) { if (btn) { btn.disabled = false; btn.textContent = tr('finishConfirm'); } toast(tr('genErr'), 'err'); }
    }

    /* ---------- Init ---------- */
    document.getElementById('langBtn').addEventListener('click', () => {
      setLang(lang === 'es' ? 'en' : 'es');
      if (order) render();
    });
    document.getElementById('sheetOverlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('sheetOverlay')) closeSheet();
    });
    setLang(lang);
    load();
  </script>
</body>
</html>
