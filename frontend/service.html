<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SERVI — Servicio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=Syne:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/shared-styles.css">
  <link rel="stylesheet" href="/shared/landing-theme.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="/shared/browse-data.js"></script>
  <style>
    .svc-page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 132px 24px 80px;
    }
    .svc-breadcrumb {
      font-size: 13px;
      color: #888;
      margin-bottom: 24px;
    }
    .svc-breadcrumb a {
      color: #888;
      text-decoration: none;
    }
    .svc-breadcrumb a:hover { text-decoration: underline; }
    .svc-breadcrumb span { margin: 0 6px; }

    .svc-layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 48px;
      align-items: start;
    }

    .svc-hero-img {
      width: 100%;
      height: 420px;
      object-fit: cover;
      border-radius: 16px;
      display: block;
      background: #f0f0f0;
    }
    .svc-title {
      font-size: 28px;
      font-weight: 700;
      margin: 24px 0 4px;
      line-height: 1.25;
      font-family: var(--font-heading, 'Syne', sans-serif);
    }
    .svc-subcat-label {
      font-size: 14px;
      color: #666;
      margin-bottom: 24px;
    }
    .svc-included-section {
      border-top: 1px solid #e8e8e8;
      padding-top: 24px;
      margin-top: 8px;
    }
    .svc-included-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .svc-included-body {
      font-size: 15px;
      color: #444;
      line-height: 1.6;
    }
    .svc-other-section {
      border-top: 1px solid #e8e8e8;
      padding-top: 24px;
      margin-top: 32px;
    }
    .svc-other-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 14px;
    }
    .svc-other-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .svc-other-chip {
      padding: 7px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      background: #fafafa;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      font-family: var(--font-body, 'DM Sans', sans-serif);
      color: inherit;
    }
    .svc-other-chip:hover {
      border-color: #111;
      background: #f5f5f5;
    }

    .svc-sidebar {
      position: sticky;
      top: 100px;
      border: 1.5px solid #e8e8e8;
      border-radius: 20px;
      padding: 28px 24px;
      background: #fff;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }
    .svc-sidebar__service-name {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .svc-sidebar__price-label {
      font-size: 15px;
      font-weight: 600;
      color: #111;
      margin-bottom: 2px;
    }
    .svc-sidebar__price-note {
      font-size: 12px;
      color: #888;
      margin-bottom: 20px;
    }
    .svc-sidebar__divider {
      border: none;
      border-top: 1px solid #efefef;
      margin: 18px 0;
    }
    .svc-sidebar__label {
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 8px;
      display: block;
    }
    .svc-when-chips {
      display: flex;
      gap: 8px;
      margin-bottom: 0;
    }
    .svc-when-chip {
      flex: 1;
      padding: 9px 12px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      background: #fafafa;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      font-family: var(--font-body, 'DM Sans', sans-serif);
      color: inherit;
    }
    .svc-when-chip.active {
      border-color: #111;
      background: #111;
      color: #fff;
    }
    .svc-schedule-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .svc-schedule-row input {
      flex: 1;
      padding: 9px 12px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 13px;
      font-family: var(--font-body, 'DM Sans', sans-serif);
      background: #fafafa;
      color: #111;
      outline: none;
      transition: border-color 0.15s;
    }
    .svc-schedule-row input:focus { border-color: #111; background: #fff; }

    .svc-sidebar__input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      font-family: var(--font-body, 'DM Sans', sans-serif);
      background: #fafafa;
      color: #111;
      outline: none;
      transition: border-color 0.15s;
      box-sizing: border-box;
      resize: none;
    }
    .svc-sidebar__input:focus { border-color: #111; background: #fff; }
    .svc-sidebar__input.error { border-color: #dc2626; }
    .svc-address-input-wrap {
      position: relative;
    }
    .svc-address-input-wrap .svc-sidebar__input {
      padding-right: 44px;
    }
    .svc-address-location-btn {
      position: absolute;
      top: 50%;
      right: 6px;
      width: 32px;
      height: 32px;
      transform: translateY(-50%);
      border: none;
      border-radius: 8px;
      background: transparent;
      color: #555;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: background 0.15s, color 0.15s, opacity 0.15s;
    }
    .svc-address-location-btn:hover {
      background: #eee;
      color: #111;
    }
    .svc-address-location-btn:disabled {
      cursor: default;
      opacity: 0.5;
    }
    .svc-address-location-btn svg {
      width: 17px;
      height: 17px;
      stroke: currentColor;
    }
    .svc-address-location-btn[data-busy="true"] svg {
      animation: svcSpin 1s linear infinite;
    }
    @keyframes svcSpin { to { transform: rotate(360deg); } }
    .svc-error-msg {
      font-size: 12px;
      color: #dc2626;
      margin-top: 4px;
      display: none;
    }
    .svc-error-msg.visible { display: block; }

    .svc-attach-zone {
      border: 1.5px dashed #d0d0d0;
      border-radius: 10px;
      padding: 10px;
      transition: border-color 0.15s;
      font-size: 13px;
      color: #666;
    }
    .svc-attach-zone:hover { border-color: #111; }
    .svc-attach-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .svc-attach-action {
      min-height: 44px;
      border: 1px solid #e2e2e2;
      border-radius: 9px;
      background: #fff;
      color: #222;
      cursor: pointer;
      font-family: var(--font-body, 'DM Sans', sans-serif);
      font-size: 13px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 9px 10px;
      transition: border-color 0.15s, background 0.15s;
    }
    .svc-attach-action:hover {
      border-color: #111;
      background: #fafafa;
    }
    .svc-attach-action span[aria-hidden="true"] {
      font-size: 16px;
      line-height: 1;
    }
    .svc-previews {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .svc-preview-thumb {
      position: relative;
      display: inline-block;
    }
    .svc-preview-thumb img {
      width: 56px;
      height: 56px;
      object-fit: cover;
      border-radius: 8px;
      display: block;
    }
    .svc-preview-thumb .svc-preview-remove {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #dc2626;
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .svc-attach-status {
      font-size: 12px;
      color: #888;
      margin-top: 6px;
    }

    .svc-cta-btn {
      width: 100%;
      padding: 14px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-body, 'DM Sans', sans-serif);
      transition: opacity 0.15s;
      margin-top: 4px;
    }
    .svc-cta-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .svc-cta-btn:hover:not(:disabled) { opacity: 0.88; }

    .svc-auth-gate {
      text-align: center;
      padding: 8px 0;
    }
    .svc-auth-gate p {
      font-size: 14px;
      color: #555;
      margin-bottom: 12px;
    }
    .svc-auth-btn {
      width: 100%;
      padding: 12px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-body, 'DM Sans', sans-serif);
    }

    .svc-success {
      text-align: center;
      padding: 16px 0;
    }
    .svc-success__icon {
      font-size: 40px;
      margin-bottom: 12px;
    }
    .svc-success__title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .svc-success__body {
      font-size: 14px;
      color: #555;
      margin-bottom: 20px;
    }
    .svc-success__wa {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      background: #25D366;
      color: #fff;
      border-radius: 12px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }

    .svc-not-found {
      text-align: center;
      padding: 80px 24px;
    }
    .svc-not-found h1 { font-size: 24px; margin-bottom: 12px; }
    .svc-not-found p { color: #666; font-size: 15px; }
    .svc-not-found a { color: #111; font-weight: 600; }

    .svc-camera-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.68);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .svc-camera-modal.visible { display: flex; }
    .svc-camera-panel {
      width: min(100%, 420px);
      background: #fff;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 18px 60px rgba(0,0,0,0.24);
    }
    .svc-camera-title {
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 12px;
      font-family: var(--font-heading, 'Syne', sans-serif);
    }
    .svc-camera-video {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #111;
      border-radius: 12px;
      object-fit: cover;
      display: block;
    }
    .svc-camera-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    .svc-camera-actions button {
      min-height: 44px;
      border-radius: 11px;
      border: 1px solid #ddd;
      background: #fff;
      color: #111;
      cursor: pointer;
      font-family: var(--font-body, 'DM Sans', sans-serif);
      font-size: 14px;
      font-weight: 700;
    }
    .svc-camera-actions .svc-camera-capture {
      border-color: #111;
      background: #111;
      color: #fff;
    }

    .svc-mobile-bar {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-top: 1px solid #e8e8e8;
      padding: 12px 20px;
      z-index: 100;
    }
    .svc-mobile-bar button {
      width: 100%;
      padding: 14px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-body, 'DM Sans', sans-serif);
    }

    .svc-mobile-form {
      display: none;
      border-top: 1px solid #e8e8e8;
      padding-top: 32px;
      margin-top: 32px;
    }
    .svc-mobile-form .svc-sidebar {
      position: static;
      box-shadow: none;
      border: none;
      border-radius: 0;
      padding: 0;
    }

    @media (max-width: 900px) {
      .svc-layout {
        grid-template-columns: 1fr;
      }
      .svc-sidebar { display: none; }
      .svc-mobile-bar { display: block; }
      .svc-mobile-form { display: block; }
    }
    @media (max-width: 600px) {
      .svc-page { padding: 112px 16px 100px; }
      .svc-hero-img { height: 240px; }
      .svc-title { font-size: 22px; }
      .svc-attach-actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="landing-page">

<script src="/config.js"></script>
<script src="/shared/i18n.js"></script>
<script src="/shared/shared-auth.js"></script>
<div id="navbar"></div>
<script src="/shared/morphing-nav.js"></script>

<main id="svc-main">
  <!-- Rendered by JS -->
</main>

<div class="svc-mobile-bar" id="svc-mobile-bar" style="display:none">
  <button type="button" id="svc-mobile-cta-btn"></button>
</div>

<div id="footer"></div>
<script src="/shared/shared-footer.js"></script>

<script>
(function () {
  const t = () => window.__t || {};
  const sp = () => (t().servicePage || {});
  const lang = () => window.__lang || 'es';

  function esc(str) {
    return String(str || '').replace(/[&<>"']/g, ch =>
      ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[ch])
    );
  }

  function getLocale() {
    return lang().startsWith('es') ? 'es' : 'en';
  }

  function getLocalizedText(value) {
    if (!value) return '';
    if (typeof value === 'string') return value;
    const locale = getLocale();
    return value[locale] || value.es || value.en || '';
  }

  const params = new URLSearchParams(window.location.search);
  const catKey = params.get('category') || '';
  const subKey = params.get('sub') || '';
  const serviceName = params.get('service') || '';

  function getCatalogData() {
    const catData = window.browseCategoryData && window.browseCategoryData[catKey];
    if (!catData) return null;
    const subData = catData.subcategories.find(s => s.key === subKey);
    if (!subData) return null;
    return { catData, subData };
  }

  function getSubcategoryImage() {
    const imgs = window.discoverySubcategoryImages || {};
    const fallbacks = window.discoveryFallbackByCategory || {};
    return (imgs[catKey] && imgs[catKey][subKey]) || fallbacks[catKey] || '/assets/partnerimage.png';
  }

  function getServiceIndex(subData) {
    const serviceSets = [
      subData.services && subData.services[getLocale()],
      subData.services && subData.services.es,
      subData.services && subData.services.en,
    ].filter(Array.isArray);

    for (const services of serviceSets) {
      const index = services.findIndex(sv => sv === serviceName);
      if (index !== -1) return index;
    }
    return -1;
  }

  function buildUnsplashUrl(photoId) {
    return `https://images.unsplash.com/${photoId}?w=1200&q=85&auto=format&fit=crop`;
  }

  function buildLoremFlickrUrl(keywords, lockSeed) {
    const safe = encodeURIComponent(keywords).replace(/%2C/gi, ',');
    let lock = 0;
    for (let i = 0; i < lockSeed.length; i++) lock = ((lock << 5) - lock + lockSeed.charCodeAt(i)) | 0;
    return `https://loremflickr.com/1200/800/${safe}?lock=${Math.abs(lock)}`;
  }

  function slugifyServiceLabel(label) {
    return String(label || '')
      .toLowerCase()
      .replace(/&/g, 'and')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-+|-+$/g, '');
  }

  function getOfficialServiceImage(subData, serviceIndex) {
    const officialImageFolders = {
      cleaning: 'cleaning/Website_AI_Images_Cleaning',
      repair: 'repair/Website_AI_Images_Repair',
      moving: 'moving/Website_AI_Images_Moving',
      wellness: 'wellness/Website_AI_Images_Wellness',
      suppliers: 'suppliers/Website_AI_Images_Suppliers',
    };
    const folder = officialImageFolders[catKey];
    const englishServices = subData.services && subData.services.en;
    if (!folder || !Array.isArray(englishServices) || !englishServices[serviceIndex]) return '';
    const slug = slugifyServiceLabel(englishServices[serviceIndex]);
    return slug ? `/assets/discovery/official/${folder}/${slug}.png` : '';
  }

  function buildImageFallbackHandler(urls) {
    const chain = urls.filter(Boolean);
    if (!chain.length) return 'this.onerror=null;';
    return chain.reduceRight((next, url) => (
      `this.onerror=function(){${next}};this.src='${url}';`
    ), 'this.onerror=null;');
  }

  function getServiceHeroImage(subData) {
    const subImage = getSubcategoryImage();
    const categoryFallback = (window.discoveryFallbackByCategory || {})[catKey] || '/assets/partnerimage.png';
    const serviceIndex = getServiceIndex(subData);
    if (serviceIndex === -1) {
      return { src: subImage, onerror: buildImageFallbackHandler([categoryFallback, '/assets/partnerimage.png']) };
    }

    const photoId = Array.isArray(subData.serviceImages) ? subData.serviceImages[serviceIndex] : '';
    const keywords = Array.isArray(subData.serviceKeywords) ? subData.serviceKeywords[serviceIndex] : '';
    const flickrUrl = keywords ? buildLoremFlickrUrl(keywords, `${catKey}-${subKey}-${serviceIndex}`) : subImage;
    const legacyPrimarySrc = photoId ? buildUnsplashUrl(photoId) : flickrUrl;
    const officialSrc = getOfficialServiceImage(subData, serviceIndex);
    const src = officialSrc || legacyPrimarySrc || subImage;
    const fallbackUrls = officialSrc
      ? [legacyPrimarySrc, flickrUrl, subImage, categoryFallback, '/assets/partnerimage.png']
      : (photoId
          ? [flickrUrl, subImage, categoryFallback, '/assets/partnerimage.png']
          : (keywords ? [subImage, categoryFallback, '/assets/partnerimage.png'] : [categoryFallback, '/assets/partnerimage.png']));

    return { src, onerror: buildImageFallbackHandler(fallbackUrls) };
  }

  function getCategoryLabel() {
    const cats = t().categories || {};
    const map = { cleaning: 'cleaning', repair: 'repair', moving: 'moving', wellness: 'wellness', suppliers: 'suppliers' };
    return cats[map[catKey]] || catKey;
  }

  function getDetailsPlaceholder() {
    const s = sp();
    if (catKey === 'repair') return s.detailsPlaceholderRepair || '';
    if (catKey === 'cleaning') return s.detailsPlaceholderCleaning || '';
    if (catKey === 'wellness') return s.detailsPlaceholderWellness || '';
    return s.detailsPlaceholderDefault || '';
  }

  function getWhatsIncluded() {
    const s = sp();
    if (catKey === 'cleaning') return s.whatsIncludedCleaning || '';
    if (catKey === 'repair') return s.whatsIncludedRepair || '';
    if (catKey === 'moving') return s.whatsIncludedMoving || '';
    if (catKey === 'wellness') return s.whatsIncludedWellness || '';
    return s.whatsIncludedSuppliers || '';
  }

  function getAddressModalText() {
    return t().addressModal || {};
  }

  function setServiceAddress(value) {
    const address = String(value || '').trim();
    ['desk', 'mob'].forEach(prefix => {
      const input = document.getElementById(`svc-addr-${prefix}`);
      const err = document.getElementById(`svc-addr-err-${prefix}`);
      if (input) {
        input.value = address;
        input.classList.remove('error');
      }
      if (err) err.classList.remove('visible');
    });
    if (address) localStorage.setItem('dash_hero_address', address);
  }

  function setServiceAddressLocationBusy(isBusy) {
    document.querySelectorAll('.svc-address-location-btn').forEach(button => {
      button.disabled = !!isBusy;
      button.dataset.busy = isBusy ? 'true' : 'false';
    });
  }

  function getCurrentPosition() {
    return new Promise((resolve, reject) => {
      navigator.geolocation.getCurrentPosition(resolve, reject, {
        enableHighAccuracy: true,
        maximumAge: 300000,
        timeout: 12000,
      });
    });
  }

  async function reverseGeocodePosition(latitude, longitude) {
    const langCode = lang() === 'es' ? 'es' : 'en';
    const url = `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${encodeURIComponent(latitude)}&longitude=${encodeURIComponent(longitude)}&localityLanguage=${langCode}`;
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 8000);

    try {
      const res = await fetch(url, { signal: controller.signal });
      if (!res.ok) return '';
      const data = await res.json();
      const rawParts = [
        data.locality,
        data.city,
        data.principalSubdivision,
        data.countryName,
      ].filter(Boolean);
      const parts = rawParts.filter((part, index) => (
        rawParts.findIndex(candidate => candidate.toLowerCase() === part.toLowerCase()) === index
      ));
      return parts.join(', ');
    } catch (_) {
      return '';
    } finally {
      clearTimeout(timeoutId);
    }
  }

  async function useCurrentLocationForServiceAddress() {
    const am = getAddressModalText();

    if (!navigator.geolocation) {
      alert(am.unsupported || (lang() === 'es' ? 'El acceso a ubicación no está disponible en este navegador.' : 'Location access is not available in this browser.'));
      return;
    }

    setServiceAddressLocationBusy(true);

    try {
      const position = await getCurrentPosition();
      const { latitude, longitude } = position.coords;
      const address = await reverseGeocodePosition(latitude, longitude);
      const fallback = `${am.currentLocation || (lang() === 'es' ? 'Ubicación actual' : 'Current location')} (${latitude.toFixed(5)}, ${longitude.toFixed(5)})`;
      setServiceAddress(address || fallback);
    } catch (err) {
      const denied = err && err.code === 1;
      alert(denied
        ? (am.permissionDenied || (lang() === 'es' ? 'No se permitió el acceso a tu ubicación.' : 'Location access was denied.'))
        : (am.locationError || (lang() === 'es' ? 'No pudimos obtener tu ubicación.' : 'Could not get your location.')));
    } finally {
      setServiceAddressLocationBusy(false);
    }
  }

  const attachments = [];
  const MAX_ATTACHMENTS = 3;
  let activeCameraStream = null;

  function renderPreviews() {
    const html = !attachments.length ? '' : attachments.map((a, i) => {
      const isImage = a.mimetype && a.mimetype.startsWith('image/');
      const thumb = isImage
        ? `<img src="${esc(a.url)}" alt="">`
        : `<div style="width:56px;height:56px;border-radius:8px;background:#eee;display:flex;align-items:center;justify-content:center;font-size:22px">📎</div>`;
      return `<div class="svc-preview-thumb">
        ${thumb}
        <button class="svc-preview-remove" type="button" onclick="window._svcRemoveAttachment(${i})" aria-label="Eliminar">✕</button>
      </div>`;
    }).join('');
    ['desk', 'mob'].forEach(prefix => {
      const el = document.getElementById(`svc-previews-${prefix}`);
      if (el) el.innerHTML = html;
    });
  }

  function setAttachStatus(text) {
    ['desk', 'mob'].forEach(prefix => {
      const el = document.getElementById(`svc-attach-status-${prefix}`);
      if (el) el.textContent = text;
    });
  }

  window._svcRemoveAttachment = function(i) {
    attachments.splice(i, 1);
    renderPreviews();
  };

  async function uploadFile(file) {
    if (attachments.length >= MAX_ATTACHMENTS) {
      setAttachStatus(lang() === 'es' ? 'Máximo 3 fotos.' : 'Maximum 3 photos.');
      return;
    }
    setAttachStatus(lang() === 'es' ? 'Subiendo…' : 'Uploading…');
    const fd = new FormData();
    fd.append('file', file);
    try {
      const res = await fetch((window.CONFIG && window.CONFIG.API_BASE || '') + '/api/uploads', {
        method: 'POST', body: fd,
      });
      const d = await res.json();
      if (!res.ok) throw new Error(d.message || d.error || 'Upload error');
      attachments.push({ url: d.url, mimetype: d.mimetype, name: file.name });
      setAttachStatus('');
      renderPreviews();
    } catch (err) {
      setAttachStatus('❌ ' + err.message);
    }
  }

  function openPhotoInput(prefix, source) {
    if (attachments.length >= MAX_ATTACHMENTS) {
      setAttachStatus(lang() === 'es' ? 'Máximo 3 fotos.' : 'Maximum 3 photos.');
      return;
    }
    const id = source === 'camera' ? `svc-camera-input-${prefix}` : `svc-file-input-${prefix}`;
    const input = document.getElementById(id);
    if (input) input.click();
  }

  function stopCameraStream() {
    if (!activeCameraStream) return;
    activeCameraStream.getTracks().forEach(track => track.stop());
    activeCameraStream = null;
  }

  function closeCameraModal() {
    stopCameraStream();
    const modal = document.getElementById('svc-camera-modal');
    const video = document.getElementById('svc-camera-video');
    if (video) video.srcObject = null;
    if (modal) modal.classList.remove('visible');
  }

  function ensureCameraModal() {
    let modal = document.getElementById('svc-camera-modal');
    const s = sp();
    if (!modal) {
      modal = document.createElement('div');
      modal.id = 'svc-camera-modal';
      modal.className = 'svc-camera-modal';
      modal.setAttribute('role', 'dialog');
      modal.setAttribute('aria-modal', 'true');
      document.body.appendChild(modal);
    }
    modal.innerHTML = `
      <div class="svc-camera-panel">
        <div class="svc-camera-title">${esc(s.cameraTitle || (lang() === 'es' ? 'Tomar foto' : 'Take photo'))}</div>
        <video class="svc-camera-video" id="svc-camera-video" autoplay playsinline muted></video>
        <div class="svc-camera-actions">
          <button type="button" onclick="window._svcCloseCamera()">${esc(s.cameraCancel || (lang() === 'es' ? 'Cancelar' : 'Cancel'))}</button>
          <button type="button" class="svc-camera-capture" onclick="window._svcCapturePhoto()">${esc(s.cameraCapture || (lang() === 'es' ? 'Usar foto' : 'Use photo'))}</button>
        </div>
      </div>
    `;
    modal.onclick = event => {
      if (event.target === modal) closeCameraModal();
    };
    return modal;
  }

  async function openServiceCamera(prefix) {
    if (attachments.length >= MAX_ATTACHMENTS) {
      setAttachStatus(lang() === 'es' ? 'Máximo 3 fotos.' : 'Maximum 3 photos.');
      return;
    }

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      openPhotoInput(prefix, 'camera');
      return;
    }

    const modal = ensureCameraModal();
    const video = modal.querySelector('#svc-camera-video');
    modal.classList.add('visible');

    try {
      activeCameraStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' } },
        audio: false,
      });
      video.srcObject = activeCameraStream;
      await video.play();
    } catch (_) {
      closeCameraModal();
      setAttachStatus(sp().cameraUnavailable || (lang() === 'es'
        ? 'No pudimos abrir la cámara. También puedes agregar fotos.'
        : 'Could not open the camera. You can still add photos.'));
    }
  }

  function captureServicePhoto() {
    const video = document.getElementById('svc-camera-video');
    if (!video || !video.videoWidth || !video.videoHeight) return;

    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    if (!ctx) return;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    canvas.toBlob(blob => {
      if (!blob) return;
      const file = new File([blob], `service-photo-${Date.now()}.jpg`, { type: 'image/jpeg' });
      closeCameraModal();
      uploadFile(file);
    }, 'image/jpeg', 0.9);
  }

  let whenType = 'asap';

  function toggleWhen(type) {
    whenType = type;
    document.querySelectorAll('.svc-when-chip').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.when === type);
    });
    const schedRows = document.querySelectorAll('.svc-schedule-row');
    schedRows.forEach(r => { r.style.display = type === 'schedule' ? 'flex' : 'none'; });
  }

  function validateAndCollect(prefix) {
    let valid = true;
    const addrInput = document.getElementById(`svc-addr-${prefix}`);
    const addrErr = document.getElementById(`svc-addr-err-${prefix}`);
    if (addrInput && !addrInput.value.trim()) {
      addrInput.classList.add('error');
      if (addrErr) addrErr.classList.add('visible');
      valid = false;
    } else if (addrInput) {
      addrInput.classList.remove('error');
      if (addrErr) addrErr.classList.remove('visible');
    }

    let preferredDate = null, preferredTime = null;
    if (whenType === 'schedule') {
      const dateInput = document.getElementById(`svc-date-${prefix}`);
      const dateErr = document.getElementById(`svc-date-err-${prefix}`);
      if (dateInput && !dateInput.value) {
        dateInput.classList.add('error');
        if (dateErr) dateErr.classList.add('visible');
        valid = false;
      } else if (dateInput) {
        dateInput.classList.remove('error');
        if (dateErr) dateErr.classList.remove('visible');
        preferredDate = dateInput.value;
        const timeInput = document.getElementById(`svc-time-${prefix}`);
        if (timeInput && timeInput.value) preferredTime = timeInput.value;
      }
    }

    if (!valid) return null;

    const detailsInput = document.getElementById(`svc-details-${prefix}`);
    const extraDetails = detailsInput ? detailsInput.value.trim() : '';
    const description = serviceName + (extraDetails ? ' — ' + extraDetails : '');

    return {
      address: addrInput ? addrInput.value.trim() : '',
      preferredDate,
      preferredTime,
      description,
    };
  }

  async function handleSubmit(prefix) {
    const data = validateAndCollect(prefix);
    if (!data) return;
    const payload = {
      category: catKey || 'custom',
      description: data.description,
      preferredDate: data.preferredDate,
      preferredTime: data.preferredTime,
      isAsap: whenType === 'asap',
      serviceAddress: data.address,
      attachments: attachments.map(a => a.url),
      lang: lang(),
    };
    if (!window.__user) {
      showAuthGate(prefix, () => sendRequest(prefix, payload));
      return;
    }
    sendRequest(prefix, payload);
  }

  async function sendRequest(prefix, payload) {
    const btn = document.getElementById(`svc-cta-btn-${prefix}`);
    if (btn) { btn.disabled = true; btn.textContent = sp().submitting || 'Enviando…'; }

    const session = JSON.parse(localStorage.getItem('servi_user_session') || '{}');
    const token = session.token || '';

    try {
      const res = await fetch((window.CONFIG && window.CONFIG.API_BASE || '') + '/api/service-requests', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          ...(token ? { 'Authorization': 'Bearer ' + token } : {}),
        },
        body: JSON.stringify({
          ...payload,
          clientName: window.__user.name || '',
          clientPhone: window.__user.phone || '',
          clientEmail: window.__user.email || '',
        }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || 'HTTP ' + res.status);
      }
      showSuccess(prefix);
    } catch (err) {
      if (btn) { btn.disabled = false; btn.textContent = sp().cta || 'Solicitar servicio'; }
      alert(lang() === 'es' ? 'Error al enviar. Intenta de nuevo.' : 'Submit error. Please try again.');
      console.error('[service.html] submit error:', err);
    }
  }

  function showAuthGate(prefix, onSuccess) {
    if (!window.openAuthModal) return;
    const resume = () => {
      window.removeEventListener('servi-auth-success', resume);
      setTimeout(() => onSuccess(), 100);
    };
    window.addEventListener('servi-auth-success', resume);
    window.openAuthModal('login');
  }

  function showSuccess(prefix) {
    const sidebar = document.getElementById(`svc-sidebar-${prefix}`);
    if (!sidebar) return;
    const waNumber = (window.CONFIG && window.CONFIG.WHATSAPP_NUMBER) || '525525112588';
    const waUrl = `https://wa.me/${waNumber}`;
    sidebar.innerHTML = `
      <div class="svc-success">
        <div class="svc-success__icon">✅</div>
        <div class="svc-success__title">${esc(sp().successTitle || '¡Solicitud enviada!')}</div>
        <div class="svc-success__body">${esc(sp().successBody || 'Te contactaremos pronto por WhatsApp.')}</div>
        <a class="svc-success__wa" href="${esc(waUrl)}" target="_blank" rel="noopener">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          ${esc(sp().successWhatsapp || 'Abrir WhatsApp')}
        </a>
      </div>
    `;
    const mobileBar = document.getElementById('svc-mobile-bar');
    if (mobileBar) mobileBar.style.display = 'none';
  }

  function buildSidebarContent(prefix) {
    const s = sp();
    const savedAddr = localStorage.getItem('dash_hero_address') || '';
    const today = new Date().toISOString().slice(0, 10);

    return `
      <div id="svc-sidebar-${prefix}">
        <div class="svc-sidebar__service-name">${esc(serviceName)}</div>
        <div class="svc-sidebar__price-label">${esc(s.priceLabel || 'Precio a confirmar')}</div>
        <div class="svc-sidebar__price-note">${esc(s.priceNote || '')}</div>
        <hr class="svc-sidebar__divider">

        <span class="svc-sidebar__label">${esc(s.whenLabel || '¿Cuándo lo necesitas?')}</span>
        <div class="svc-when-chips">
          <button class="svc-when-chip active" type="button" data-when="asap"
                  onclick="window._svcToggleWhen('asap')">${esc(s.whenAsap || 'Lo antes posible')}</button>
          <button class="svc-when-chip" type="button" data-when="schedule"
                  onclick="window._svcToggleWhen('schedule')">${esc(s.whenSchedule || 'Programar')}</button>
        </div>
        <div class="svc-schedule-row" style="display:none">
          <input type="date" class="svc-sidebar__input" id="svc-date-${prefix}" min="${today}"
                 placeholder="${esc(s.datePlaceholder || 'Fecha')}">
          <input type="time" class="svc-sidebar__input" id="svc-time-${prefix}"
                 placeholder="${esc(s.timePlaceholder || 'Hora (opcional)')}">
        </div>
        <div class="svc-error-msg" id="svc-date-err-${prefix}">${esc(s.dateError || 'Por favor selecciona una fecha')}</div>

        <hr class="svc-sidebar__divider">
        <span class="svc-sidebar__label">${esc(s.addressLabel || 'Dirección del servicio')}</span>
        <div class="svc-address-input-wrap">
          <input type="text" class="svc-sidebar__input" id="svc-addr-${prefix}"
                 placeholder="${esc(s.addressPlaceholder || 'Calle, número, colonia')}"
                 value="${esc(savedAddr)}">
          <button class="svc-address-location-btn" type="button"
                  onclick="window._svcUseCurrentLocation('${prefix}')"
                  aria-label="${esc((getAddressModalText().locationBtn) || (lang() === 'es' ? 'Permitir acceso a mi ubicación' : 'Allow access to my location'))}"
                  title="${esc((getAddressModalText().locationBtn) || (lang() === 'es' ? 'Permitir acceso a mi ubicación' : 'Allow access to my location'))}">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 2v3"></path>
              <path d="M12 19v3"></path>
              <path d="M2 12h3"></path>
              <path d="M19 12h3"></path>
              <circle cx="12" cy="12" r="7"></circle>
              <circle cx="12" cy="12" r="2"></circle>
            </svg>
          </button>
        </div>
        <div class="svc-error-msg" id="svc-addr-err-${prefix}">${esc(s.addressError || 'Por favor ingresa tu dirección')}</div>

        <hr class="svc-sidebar__divider">
        <span class="svc-sidebar__label">${esc(s.detailsLabel || 'Detalles adicionales (opcional)')}</span>
        <textarea class="svc-sidebar__input" id="svc-details-${prefix}" rows="3"
                  placeholder="${esc(getDetailsPlaceholder())}"></textarea>

        <hr class="svc-sidebar__divider">
        <span class="svc-sidebar__label">${esc(s.attachLabel || 'Adjuntar fotos (opcional)')}</span>
        <div class="svc-attach-zone" id="svc-attach-zone-${prefix}">
          <div class="svc-attach-actions">
            <button class="svc-attach-action" type="button" onclick="window._svcOpenPhotoPicker('${prefix}', 'library')">
              <span aria-hidden="true">🖼️</span>
              <span>${esc(s.attachAddPhotos || (lang() === 'es' ? 'Agregar fotos' : 'Add photos'))}</span>
            </button>
            <button class="svc-attach-action" type="button" onclick="window._svcOpenCamera('${prefix}')">
              <span aria-hidden="true">📷</span>
              <span>${esc(s.attachTakePhoto || (lang() === 'es' ? 'Tomar foto' : 'Take photo'))}</span>
            </button>
          </div>
        </div>
        <input type="file" id="svc-file-input-${prefix}" accept="image/*" multiple
               style="display:none" onchange="window._svcHandleFileInput(this)">
        <input type="file" id="svc-camera-input-${prefix}" accept="image/*" capture="environment"
               style="display:none" onchange="window._svcHandleFileInput(this)">
        <div class="svc-previews" id="svc-previews-${prefix}"></div>
        <div class="svc-attach-status" id="svc-attach-status-${prefix}"></div>

        <hr class="svc-sidebar__divider">
        <button class="svc-cta-btn" type="button" id="svc-cta-btn-${prefix}"
                onclick="window._svcSubmit('${prefix}')">
          ${esc(s.cta || 'Solicitar servicio')}
        </button>
      </div>
    `;
  }

  window._svcToggleWhen = function(type) {
    toggleWhen(type);
  };

  window._svcSubmit = function(prefix) {
    handleSubmit(prefix);
  };

  window._svcUseCurrentLocation = function() {
    useCurrentLocationForServiceAddress();
  };

  window._svcOpenPhotoPicker = function(prefix, source) {
    openPhotoInput(prefix, source);
  };

  window._svcOpenCamera = function(prefix) {
    openServiceCamera(prefix);
  };

  window._svcCloseCamera = function() {
    closeCameraModal();
  };

  window._svcCapturePhoto = function() {
    captureServicePhoto();
  };

  window._svcHandleFileInput = function(input) {
    window._svcHandleFiles(input.files);
    input.value = '';
  };

  window._svcHandleFiles = function(files) {
    const remaining = MAX_ATTACHMENTS - attachments.length;
    if (remaining <= 0) {
      setAttachStatus(lang() === 'es' ? 'Máximo 3 fotos.' : 'Maximum 3 photos.');
      return;
    }
    const list = Array.from(files);
    if (list.length > remaining) {
      setAttachStatus(lang() === 'es' ? 'Máximo 3 fotos.' : 'Maximum 3 photos.');
    }
    list.slice(0, remaining).forEach(f => uploadFile(f));
  };

  window._svcOpenOtherService = function(otherService) {
    let decoded = otherService;
    try { decoded = decodeURIComponent(otherService); } catch (_) {}
    const p = new URLSearchParams();
    p.set('category', catKey);
    p.set('sub', subKey);
    p.set('service', decoded);
    window.open('/service.html?' + p.toString(), '_blank');
  };

  function render() {
    const main = document.getElementById('svc-main');
    if (!main) return;

    if (serviceName) document.title = `SERVI — ${serviceName}`;

    const catalog = getCatalogData();
    const s = sp();

    if (!catalog || !serviceName) {
      main.innerHTML = `
        <div class="svc-not-found">
          <h1>${esc(s.notFound || 'Servicio no encontrado')}</h1>
          <p>${esc(s.notFoundBody || 'El enlace puede estar incompleto. Vuelve a explorar desde')}
             <a href="/browse.html">${esc(s.notFoundLink || 'browse.html')}</a>.</p>
        </div>
      `;
      return;
    }

    const { subData } = catalog;
    const heroImage = getServiceHeroImage(subData);
    const subLabel = getLocalizedText(subData.label);
    const catLabel = getCategoryLabel();
    const otherServices = (subData.services[getLocale()] || subData.services.es || [])
      .filter(sv => sv !== serviceName);

    main.innerHTML = `
      <div class="svc-page">
        <div class="svc-breadcrumb">
          <a href="/browse.html">Browse</a>
          <span>›</span>
          <a href="/browse.html?category=${esc(catKey)}">${esc(catLabel)}</a>
          <span>›</span>
          <span>${esc(subLabel)}</span>
        </div>

        <div class="svc-layout">
          <div class="svc-left">
            <img class="svc-hero-img" src="${esc(heroImage.src)}" alt="${esc(serviceName)}"
                 onerror="${esc(heroImage.onerror)}">
            <h1 class="svc-title">${esc(serviceName)}</h1>
            <div class="svc-subcat-label">${esc(subLabel)} · ${esc(catLabel)}</div>

            <div class="svc-included-section">
              <div class="svc-included-title">${esc(s.whatsIncluded || '¿Qué incluye?')}</div>
              <div class="svc-included-body">${esc(getWhatsIncluded())}</div>
            </div>

            ${otherServices.length ? `
              <div class="svc-other-section">
                <div class="svc-other-title">${esc(s.otherServices || 'Otros servicios en esta categoría')}</div>
                <div class="svc-other-chips">
                  ${otherServices.map(sv => `
                    <button class="svc-other-chip" type="button"
                            onclick="window._svcOpenOtherService('${esc(encodeURIComponent(sv))}')">
                      ${esc(sv)}
                    </button>
                  `).join('')}
                </div>
              </div>
            ` : ''}

            <div class="svc-mobile-form">
              <div class="svc-sidebar" id="svc-sidebar-wrap-mob">
                ${buildSidebarContent('mob')}
              </div>
            </div>
          </div>

          <div class="svc-sidebar" id="svc-sidebar-wrap-desk">
            ${buildSidebarContent('desk')}
          </div>
        </div>
      </div>
    `;

    const mobileBar = document.getElementById('svc-mobile-bar');
    const mobileCta = document.getElementById('svc-mobile-cta-btn');
    if (mobileCta) mobileCta.textContent = s.cta || 'Solicitar servicio';
    if (mobileBar) {
      mobileBar.style.display = '';
      if (mobileCta) {
        mobileCta.onclick = () => {
          const mobileForm = document.querySelector('.svc-mobile-form');
          if (mobileForm) mobileForm.scrollIntoView({ behavior: 'smooth' });
        };
      }
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', render);
  } else {
    render();
  }

  window.addEventListener('langchange', render);
})();
</script>
</body>
</html>
