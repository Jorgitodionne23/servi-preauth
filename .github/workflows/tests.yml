name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    name: Unit tests + audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test:unit

      # Fail the build only on high/critical advisories in production deps.
      # Moderates are reported by Dependabot instead of blocking every push.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
